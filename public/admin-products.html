<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario | Ecugaming Import</title>
    <link rel="stylesheet" href="style.css?v=1.0.6">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: var(--secondary);
            color: var(--bg-light);
            font-feature-settings: "cv11", "ss01";
        }

        .admin-layout {
            min-height: 100vh;
            background: #000;
        }

        .admin-sidebar {
            background: #050505;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            overflow-y: auto;
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: 280px;
            z-index: 1100;
        }

        .sidebar-brand {
            padding: 0 1rem 2rem;
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--white);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-brand span {
            color: var(--primary);
        }

        .sidebar-group {
            font-size: 10px;
            font-weight: 800;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 1.5rem 1rem 0.5rem;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13.5px;
            font-weight: 500;
            color: #a1a1aa;
            text-decoration: none;
            transition: 0.2s;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }

        .sidebar-item:hover {
            background: rgba(255, 255, 255, 0.04);
            color: var(--white);
        }

        .sidebar-item.active {
            background: var(--primary) !important;
            color: #fff !important;
            box-shadow: 0 4px 12px var(--primary-glow);
            font-weight: 700;
        }

        .admin-content {
            padding: 2.5rem;
            overflow-x: auto;
            background: var(--bg-light);
            margin-left: 280px;
            min-height: 100vh;
        }

        .admin-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-glass);
        }

        .admin-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 13px;
        }

        .admin-table th {
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-dim);
            font-weight: 600;
            text-align: left;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
        }

        .admin-table td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            color: #e2e2e7;
            vertical-align: middle;
        }

        .product-thumb {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            object-fit: cover;
            background: #2a2a30;
            border: 1px solid var(--border);
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: #e2e2e7;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-action.primary {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
            font-weight: 600;
        }

        .status-chip {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 8px;
            text-transform: uppercase;
        }

        .s-recibido {
            background: rgba(52, 199, 89, 0.1);
            color: #34c759;
        }

        .s-cancelado {
            background: rgba(255, 107, 107, 0.1);
            color: #ff6b6b;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: #1c1c1e;
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        .form-control {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--white);
            padding: 12px 16px;
            font-size: 14px;
        }

        .img-gallery {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .img-thumb-wrap {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .img-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .img-del-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(0, 0, 0, 0.7);
            color: #ff6b6b;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }

        .upload-trigger {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            border: 2px dashed var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            cursor: pointer;
        }

        .form-row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .modal-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.5rem;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-brand">Ecugaming <span>Import</span></div>
            <div class="sidebar-group">Principal</div>
            <a href="admin.html" class="sidebar-item"><i class="fa fa-th-large"></i> Dashboard</a>
            <a href="admin-products.html" class="sidebar-item active"><i class="fa fa-box"></i> Inventario</a>
            <a href="admin-orders.html" class="sidebar-item"><i class="fa fa-shopping-cart"></i> Ventas</a>
            <a href="admin-customers.html" class="sidebar-item"><i class="fa fa-users"></i> Clientes</a>
            <div class="sidebar-group">Configuración</div>
            <a href="admin-settings.html" class="sidebar-item"><i class="fa fa-cog"></i> Ajustes</a>
            <div style="margin-top:auto; padding:1rem;">
                <button class="sidebar-item" onclick="signOutAdmin()" style="color:#ff6b6b;"><i
                        class="fa fa-sign-out-alt"></i> Cerrar Sesión</button>
            </div>
        </aside>

        <div class="admin-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                <h2 style="font-size:1.3rem; font-weight:800; color:#f5f5f7;">Inventario de Productos</h2>
                <button class="btn-action primary" onclick="openProductModal()"><i class="fa fa-plus"></i> Nuevo
                    Producto</button>
            </div>

            <div class="admin-card">
                <div class="table-search">
                    <input type="text" id="prodSearch" placeholder="Buscar por nombre o categoría..."
                        oninput="filterProducts()">
                </div>
                <div style="overflow-x:auto;">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Img</th>
                                <th>Nombre</th>
                                <th>Categoría</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Badge</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="productsBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="productModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('productModal')">&times;</button>
            <h3 id="productModalTitle" style="color:white; margin-bottom:1.5rem;">Nuevo Producto</h3>
            <input type="hidden" id="prodId">
            <div class="form-row-2">
                <div class="form-group"><label>Nombre *</label><input type="text" id="prodName" class="form-control">
                </div>
                <div class="form-group"><label>Marca</label><input type="text" id="prodBrand" class="form-control">
                </div>
            </div>
            <div class="form-row-2">
                <div class="form-group"><label>Categoría</label><select id="prodCategory" class="form-control"></select>
                </div>
                <div class="form-group"><label>Badge</label>
                    <select id="prodBadge" class="form-control">
                        <option value="">Sin badge</option>
                        <option value="Súper OFERTA">Súper OFERTA</option>
                        <option value="Remate">Remate</option>
                        <option value="Nuevo">Nuevo</option>
                    </select>
                </div>
            </div>
            <div class="form-row-2">
                <div class="form-group"><label>Precio de Lista *</label><input type="number" id="prodPrice"
                        class="form-control" step="0.01"></div>
                <div class="form-group"><label>Precio Oferta</label><input type="number" id="prodSalePrice"
                        class="form-control" step="0.01"></div>
            </div>
            <div class="form-row-2">
                <div class="form-group"><label>Stock</label><input type="number" id="prodStock" class="form-control">
                </div>
                <div class="form-group"><label>Activo</label>
                    <select id="prodActive" class="form-control">
                        <option value="true">Sí</option>
                        <option value="false">No</option>
                    </select>
                </div>
            </div>
            <div class="form-group"><label>Descripción</label><textarea id="prodDesc" class="form-control"
                    style="min-height:80px;"></textarea></div>

            <div id="prodImagesSection" style="display:none;">
                <label
                    style="color:var(--text-dim); font-size:0.8rem; font-weight:700; text-transform:uppercase;">Imágenes</label>
                <div class="img-gallery" id="prodImgGallery"></div>
                <input type="file" id="newImageFile" accept="image/*" style="display:none;"
                    onchange="uploadProductImage()">
            </div>

            <div style="margin-top:2rem; display:flex; justify-content:flex-end; gap:1rem;">
                <button class="btn-action" onclick="closeModal('productModal')">Cancelar</button>
                <button class="btn-action primary" id="btnSaveProd" onclick="saveProduct()">Guardar Producto</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="/lib/supabase-client.js?v=1.0.6"></script>
    <script src="/lib/auth.js?v=1.0.6"></script>
    <script>
        let adminToken = '';
        let allProducts = [];
        let categories = [];
        let currentProductId = null;
        const SUPABASE_URL = window.SUPABASE_URL || 'https://dpomkchvjpdkndkksphy.supabase.co';

        async function init() {
            adminToken = await Auth.requireAdmin();
            if (!adminToken) return;
            loadProducts();
            loadCategories();
        }

        async function apiFetch(url, opts = {}) {
            return fetch(url, {
                ...opts,
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminToken, ...(opts.headers || {}) }
            });
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        async function signOutAdmin() { await _supabase.auth.signOut(); location.href = 'login.html'; }

        async function loadProducts() {
            const res = await apiFetch('/api/admin/products');
            allProducts = await res.json();
            renderProductsTable(allProducts);
        }

        async function loadCategories() {
            const { data } = await _supabase.from('categories').select('id,name').order('sort');
            categories = data || [];
            const sel = document.getElementById('prodCategory');
            sel.innerHTML = '<option value="">Sin categoría</option>';
            categories.forEach(c => { const o = document.createElement('option'); o.value = c.id; o.textContent = c.name; sel.appendChild(o); });
        }

        function filterProducts() {
            const q = document.getElementById('prodSearch').value.toLowerCase();
            renderProductsTable(allProducts.filter(p => p.name.toLowerCase().includes(q) || (p.category?.name || '').toLowerCase().includes(q)));
        }

        function renderProductsTable(products) {
            const tbody = document.getElementById('productsBody');
            if (!products.length) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:#9999a8; padding:2rem;">Sin productos.</td></tr>'; return; }
            tbody.innerHTML = products.map(p => {
                const sp = p.images?.[0]?.storage_path;
                const imgUrl = sp ? (sp.startsWith('http') ? sp : `${SUPABASE_URL}/storage/v1/object/public/product-images/${sp}`) : 'https://via.placeholder.com/40';
                return `<tr>
                    <td><img class="product-thumb" src="${imgUrl}" onerror="this.src='https://via.placeholder.com/40'"></td>
                    <td style="font-weight:700;">${p.name}</td>
                    <td>${p.category?.name || '—'}</td>
                    <td>$${Number(p.sale_price || p.price).toFixed(2)}</td>
                    <td style="font-weight:700; color:${p.stock < 5 ? '#ff6b6b' : '#d0d0d8'};">${p.stock}</td>
                    <td>${p.badge ? `<span class="status-chip" style="background:#3d2000;color:#ff9f0a;">${p.badge}</span>` : '—'}</td>
                    <td><span class="status-chip ${p.is_active ? 's-recibido' : 's-cancelado'}">${p.is_active ? 'Activo' : 'Inactivo'}</span></td>
                    <td style="display:flex; gap:.3rem;">
                        <button class="btn-action" onclick='editProduct("${p.id}")'>Editar</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function openProductModal() {
            currentProductId = null;
            document.getElementById('productModalTitle').textContent = 'Nuevo Producto';
            ['prodId', 'prodName', 'prodBrand', 'prodDesc', 'prodPrice', 'prodSalePrice', 'prodStock'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('prodActive').value = 'true';
            document.getElementById('prodCategory').value = '';
            document.getElementById('prodImagesSection').style.display = 'none';
            openModal('productModal');
        }

        async function editProduct(id) {
            currentProductId = id;
            const p = allProducts.find(x => x.id === id);
            if (!p) return;
            document.getElementById('productModalTitle').textContent = 'Editar Producto';
            document.getElementById('prodId').value = p.id;
            document.getElementById('prodName').value = p.name;
            document.getElementById('prodBrand').value = p.brand || '';
            document.getElementById('prodDesc').value = p.description || '';
            document.getElementById('prodPrice').value = p.price;
            document.getElementById('prodSalePrice').value = p.sale_price || '';
            document.getElementById('prodStock').value = p.stock;
            document.getElementById('prodActive').value = String(p.is_active);
            document.getElementById('prodCategory').value = p.category?.id || '';
            renderProductImages(p);
            document.getElementById('prodImagesSection').style.display = 'block';
            openModal('productModal');
        }

        function renderProductImages(p) {
            const gallery = document.getElementById('prodImgGallery');
            const thumbs = (p.images || []).map(img => {
                const url = img.storage_path.startsWith('http') ? img.storage_path : `${SUPABASE_URL}/storage/v1/object/public/product-images/${img.storage_path}`;
                return `<div class="img-thumb-wrap"><img class="img-thumb" src="${url}"><button class="img-del-btn" onclick="deleteProductImage('${img.id}','${p.id}')">✕</button></div>`;
            }).join('');
            gallery.innerHTML = thumbs + `<div class="upload-trigger" onclick="document.getElementById('newImageFile').click()"><i class="fa fa-plus"></i></div>`;
        }

        async function saveProduct() {
            const id = document.getElementById('prodId').value;
            const name = document.getElementById('prodName').value.trim();
            const price = parseFloat(document.getElementById('prodPrice').value);
            if (!name || isNaN(price)) { alert('Nombre y precio son requeridos.'); return; }
            const payload = {
                name, price,
                brand: document.getElementById('prodBrand').value.trim(),
                description: document.getElementById('prodDesc').value.trim(),
                sale_price: parseFloat(document.getElementById('prodSalePrice').value) || null,
                stock: parseInt(document.getElementById('prodStock').value) || 0,
                is_active: document.getElementById('prodActive').value === 'true',
                category_id: document.getElementById('prodCategory').value || null,
                badge: document.getElementById('prodBadge').value || null
            };
            const btn = document.getElementById('btnSaveProd');
            btn.disabled = true;
            try {
                const res = id ? await apiFetch(`/api/admin/products/${id}`, { method: 'PATCH', body: JSON.stringify(payload) }) : await apiFetch('/api/admin/products', { method: 'POST', body: JSON.stringify(payload) });
                if (res.ok) {
                    const saved = await res.json();
                    if (!id) {
                        currentProductId = saved.id;
                        document.getElementById('prodId').value = saved.id;
                        document.getElementById('prodImagesSection').style.display = 'block';
                        renderProductImages(saved);
                        alert('¡Producto creado! Ahora puedes subir imágenes.');
                    } else {
                        closeModal('productModal');
                        loadProducts();
                    }
                } else { const e = await res.json(); alert('Error: ' + e.error); }
            } catch (err) { alert('Error de conexión'); }
            finally { btn.disabled = false; }
        }

        async function uploadProductImage() {
            const file = document.getElementById('newImageFile').files[0];
            if (!file || !currentProductId) return;
            const fd = new FormData();
            fd.append('image', file);
            const res = await fetch(`/api/admin/products/${currentProductId}/images`, { method: 'POST', headers: { 'Authorization': 'Bearer ' + adminToken }, body: fd });
            if (res.ok) { await loadProducts(); const p = allProducts.find(x => x.id === currentProductId); if (p) renderProductImages(p); }
            document.getElementById('newImageFile').value = '';
        }

        async function deleteProductImage(imageId, productId) {
            if (!confirm('¿Eliminar imagen?')) return;
            await apiFetch(`/api/admin/products/${productId}/images/${imageId}`, { method: 'DELETE' });
            await loadProducts();
            const p = allProducts.find(x => x.id === productId);
            if (p) renderProductImages(p);
        }

        init();
    </script>
</body>

</html>
