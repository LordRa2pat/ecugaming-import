<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producto | Ecugaming Import</title>
    <link rel="stylesheet" href="style.css?v=1.0.8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .product-page {
            max-width: 1100px;
            margin: 120px auto 80px;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: start;
        }

        .product-gallery {
            position: sticky;
            top: 120px;
        }

        .product-gallery .main-img-wrap {
            background: #1a1a1e;
            border-radius: 24px;
            border: 1px solid var(--border);
            overflow: hidden;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-gallery .main-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 1.5rem;
        }

        .product-thumbs {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .product-thumb {
            width: 64px;
            height: 64px;
            border-radius: 12px;
            border: 2px solid var(--border);
            overflow: hidden;
            cursor: pointer;
            background: #1a1a1e;
            transition: border-color 0.2s;
        }

        .product-thumb.active { border-color: var(--primary); }

        .product-thumb img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 4px;
        }

        .product-info h1 {
            font-size: 2rem;
            color: var(--white);
            margin-bottom: 0.75rem;
            line-height: 1.2;
            font-weight: 900;
        }

        .product-category {
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            margin-bottom: 0.5rem;
            display: block;
        }

        .product-badge {
            display: inline-block;
            background: var(--primary);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 3px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.75rem;
        }

        .price-row {
            display: flex;
            align-items: baseline;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        .product-price {
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--white);
        }

        .product-old-price {
            font-size: 1.4rem;
            text-decoration: line-through;
            color: var(--text-dim);
        }

        .product-description {
            font-size: 1rem;
            color: var(--text-dim);
            margin-bottom: 1.75rem;
            line-height: 1.8;
        }

        .product-meta {
            background: var(--card-bg);
            padding: 1.25rem 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 1.75rem;
        }

        .meta-item {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            padding: 0.4rem 0;
            color: var(--text);
            font-size: 0.95rem;
        }

        .meta-item i {
            color: var(--primary);
            font-size: 1rem;
            width: 18px;
            text-align: center;
        }

        .meta-item strong { color: var(--white); }

        .btn-add-cart {
            width: 100%;
            padding: 1.1rem;
            font-size: 1.1rem;
            font-weight: 800;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            box-shadow: 0 4px 20px rgba(255, 140, 0, 0.35);
        }

        .btn-add-cart:hover { background: #ff9a1a; transform: translateY(-1px); }
        .btn-add-cart:disabled { background: #3a3a3c; color: #666; cursor: not-allowed; box-shadow: none; transform: none; }

        .btn-back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-dim);
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: color 0.2s;
        }

        .btn-back-link:hover { color: var(--primary); }

        .stock-badge-out {
            color: #ff453a;
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .add-feedback {
            display: none;
            background: rgba(52,199,89,0.1);
            border: 1px solid rgba(52,199,89,0.3);
            color: #34c759;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-weight: 600;
            font-size: 0.95rem;
            text-align: center;
            margin-top: 0.75rem;
        }

        @media (max-width: 768px) {
            .product-page { grid-template-columns: 1fr; margin-top: 100px; gap: 2rem; }
            .product-gallery { position: static; }
            .product-info h1 { font-size: 1.6rem; }
            .product-price { font-size: 2rem; }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo" onclick="location.href='/'">Ecugaming <span>Import</span></div>
        <div class="nav-actions">
            <button class="btn-secondary" style="padding:.45rem 1rem; font-size:.85rem;" onclick="location.href='/'">
                <i class="fa fa-store"></i> Tienda
            </button>
            <div id="authArea"></div>
        </div>
    </header>

    <main class="product-page" id="productDetail">
        <div style="grid-column:1/-1; text-align:center; padding:4rem; color:var(--text-dim);">
            <i class="fa fa-spinner fa-spin" style="font-size:2rem; margin-bottom:1rem; display:block;"></i>
            Cargando producto...
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="/lib/supabase-client.js?v=1.0.8"></script>
    <script src="/lib/auth.js?v=1.0.8"></script>
    <script src="/lib/cart.js?v=1.0.8"></script>
    <script>
        const SUPABASE_URL = window.SUPABASE_URL || 'https://dpomkchvjpdkndkksphy.supabase.co';

        let currentImages = [];
        let currentImageIdx = 0;

        function switchImage(idx) {
            if (!currentImages[idx]) return;
            currentImageIdx = idx;
            document.getElementById('mainImg').src = currentImages[idx];
            document.querySelectorAll('.product-thumb').forEach((el, i) => el.classList.toggle('active', i === idx));
        }

        async function loadProduct() {
            const id = new URLSearchParams(location.search).get('id');
            if (!id) { showNotFound(); return; }

            try {
                const { data: product, error } = await _supabase
                    .from('products')
                    .select(`id, name, brand, description, price, sale_price, stock, badge,
                             category:categories(id, name),
                             images:product_images(id, storage_path, sort)`)
                    .eq('id', id)
                    .eq('is_active', true)
                    .single();

                if (error || !product) { showNotFound(); return; }
                renderProduct(product);
            } catch (e) {
                showNotFound();
            }
        }

        function showNotFound() {
            document.getElementById('productDetail').innerHTML =
                `<div style="grid-column:1/-1; text-align:center; padding:4rem;">
                    <i class="fa fa-box-open" style="font-size:3rem; color:var(--text-dim); margin-bottom:1rem; display:block;"></i>
                    <h2 style="color:var(--white);">Producto no encontrado</h2>
                    <button class="btn-buy" onclick="location.href='/'" style="margin-top:1.5rem; width:auto; padding:0.8rem 2rem;">← Volver a la Tienda</button>
                </div>`;
        }

        function renderProduct(p) {
            document.title = `${p.name} | Ecugaming Import`;

            const imgs = (p.images || []).map(img => {
                const sp = img.storage_path;
                return sp.startsWith('http') ? sp : `${SUPABASE_URL}/storage/v1/object/public/product-images/${sp}`;
            });
            if (!imgs.length) imgs.push('https://via.placeholder.com/600x600?text=Sin+imagen');
            currentImages = imgs;

            const effectivePrice = p.sale_price ?? p.price;
            const hasOffer = p.sale_price && p.sale_price < p.price;
            const inStock = p.stock > 0;

            const thumbsHtml = imgs.length > 1
                ? `<div class="product-thumbs">${imgs.map((url, i) =>
                    `<div class="product-thumb ${i === 0 ? 'active' : ''}" onclick="switchImage(${i})">
                        <img src="${url}" alt="">
                    </div>`).join('')}</div>`
                : '';

            document.getElementById('productDetail').innerHTML = `
                <div class="product-gallery">
                    <div class="main-img-wrap">
                        <img id="mainImg" src="${imgs[0]}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/600x600?text=Sin+imagen'">
                    </div>
                    ${thumbsHtml}
                </div>
                <div class="product-info">
                    ${p.category?.name ? `<span class="product-category">${p.category.name}</span>` : ''}
                    ${p.badge ? `<span class="product-badge">${p.badge}</span>` : ''}
                    <h1>${p.name}</h1>
                    <div class="price-row">
                        <span class="product-price">$${Number(effectivePrice).toFixed(2)}</span>
                        ${hasOffer ? `<span class="product-old-price">$${Number(p.price).toFixed(2)}</span>` : ''}
                    </div>
                    ${p.description ? `<p class="product-description">${p.description}</p>` : ''}

                    <div class="product-meta">
                        <div class="meta-item"><i class="fa fa-truck"></i> Envío Gratis a Lago Agrio y Coca</div>
                        <div class="meta-item"><i class="fa fa-shield-alt"></i> Garantía Real Directa</div>
                        <div class="meta-item"><i class="fa fa-check-circle"></i> Disponibilidad: <strong style="color:${inStock ? '#34c759' : '#ff453a'}">${inStock ? 'En Stock' : 'Agotado'}</strong></div>
                        ${p.brand ? `<div class="meta-item"><i class="fa fa-tag"></i> Marca: <strong>${p.brand}</strong></div>` : ''}
                    </div>

                    <button class="btn-add-cart" id="btnAdd" ${!inStock ? 'disabled' : ''} onclick="addToCart()">
                        <i class="fa ${inStock ? 'fa-cart-plus' : 'fa-ban'}"></i>
                        ${inStock ? 'Añadir al Carrito' : 'Agotado'}
                    </button>
                    <div class="add-feedback" id="addFeedback"><i class="fa fa-check"></i> ¡Añadido al carrito!</div>

                    <div class="btn-back-link" onclick="location.href='/'">
                        <i class="fa fa-arrow-left"></i> Seguir Comprando
                    </div>
                </div>
            `;
        }

        function addToCart() {
            const id = new URLSearchParams(location.search).get('id');
            const btn = document.getElementById('btnAdd');
            const fb = document.getElementById('addFeedback');
            btn.disabled = true;

            _supabase.from('products')
                .select('id, name, price, sale_price, brand, images:product_images(storage_path, sort)')
                .eq('id', id).single()
                .then(({ data: p }) => {
                    if (!p) return;
                    const sorted = (p.images || []).sort((a, b) => a.sort - b.sort);
                    const sp = sorted[0]?.storage_path;
                    const image_url = sp ? (sp.startsWith('http') ? sp : `${SUPABASE_URL}/storage/v1/object/public/product-images/${sp}`) : null;
                    Cart.add({ id: p.id, name: p.name, price: p.price, sale_price: p.sale_price, image_url });
                    btn.innerHTML = '<i class="fa fa-check"></i> Añadido';
                    fb.style.display = 'block';
                    setTimeout(() => {
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fa fa-cart-plus"></i> Añadir al Carrito';
                        fb.style.display = 'none';
                    }, 2000);
                });
        }

        Auth.updateAuthUI();
        loadProduct();
    </script>
</body>

</html>
