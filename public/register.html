<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Ecugaming Import</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 120px auto;
            padding: 2.5rem;
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            color: var(--secondary);
            font-weight: 900;
            font-size: 2rem;
        }

        .auth-header span {
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .form-control {
            width: 100%;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: #f8fafc;
            font-size: 1rem;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 69, 0, 0.1);
        }

        .btn-auth {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-auth:hover {
            background: #e63e00;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo" onclick="location.href='index.html'">Ecugaming <span>Import</span></div>
    </header>

    <div class="auth-container">
        <div class="auth-header">
            <h1>Crea tu <span>Cuenta</span></h1>
            <p>Únete a la comunidad tecnológica líder.</p>
        </div>
        <form id="registerForm">
            <div class="form-group">
                <label>Nombres Completos</label>
                <input type="text" id="regName" class="form-control" required placeholder="Juan Pérez">
            </div>
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="regEmail" class="form-control" required placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label>Número de Teléfono</label>
                <input type="text" id="regPhone" class="form-control" required placeholder="099...">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="regPass" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-auth">Registrarse</button>
        </form>
        <div class="auth-footer">
            ¿Ya tienes cuenta? <a href="login.html">Inicia Sesión</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('regName').value,
                email: document.getElementById('regEmail').value,
                phone: document.getElementById('regPhone').value,
                password: document.getElementById('regPass').value
            };
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (res.ok) {
                    alert('Registro exitoso. Ahora puedes iniciar sesión.');
                    location.href = 'login.html';
                } else {
                    alert(result.error);
                }
            } catch (err) { alert('Error de conexión'); }
        });
    </script>
</body>

</html>
