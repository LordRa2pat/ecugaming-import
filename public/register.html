<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Ecugaming Import</title>
    <link rel="stylesheet" href="style.css?v=1.0.1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 80px auto;
            padding: 2.5rem;
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, .05);
            border: 1px solid var(--border);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            color: var(--secondary);
            font-weight: 900;
            font-size: 2rem;
        }

        .auth-header span {
            color: var(--primary);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .8rem;
        }

        .form-group {
            margin-bottom: 1.1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: .4rem;
            font-weight: 600;
            font-size: .9rem;
            color: var(--text-dim);
        }

        .form-control {
            width: 100%;
            padding: .9rem 1rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: #f8fafc;
            font-size: 1rem;
            transition: .3s;
            box-sizing: border-box;
        }

        .form-control:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 113, 227, .1);
        }

        .btn-auth {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: .2s;
        }

        .btn-auth:hover {
            opacity: .88;
        }

        .btn-auth:disabled {
            opacity: .6;
            cursor: not-allowed;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: .9rem;
            color: var(--text-dim);
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
        }

        .error-msg {
            background: #fff0f0;
            color: #c0392b;
            border: 1px solid #f5c6c6;
            border-radius: 10px;
            padding: .8rem 1rem;
            margin-bottom: 1rem;
            font-size: .9rem;
            display: none;
        }

        .success-msg {
            background: #f0fff4;
            color: #27ae60;
            border: 1px solid #b2dfdb;
            border-radius: 10px;
            padding: .8rem 1rem;
            margin-bottom: 1rem;
            font-size: .9rem;
            display: none;
        }

        .password-hint {
            font-size: .78rem;
            color: var(--text-dim);
            margin-top: .25rem;
        }

        @media (max-width: 500px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo" onclick="location.href='index.html'">Ecugaming <span>Import</span></div>
    </header>

    <div class="auth-container">
        <div class="auth-header">
            <h1>Crea tu <span>Cuenta</span></h1>
            <p>Únete a la comunidad tecnológica líder.</p>
        </div>

        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>

        <form id="registerForm">
            <div class="form-group">
                <label>Nombres Completos</label>
                <input type="text" id="regFullName" class="form-control" required placeholder="Juan Pérez"
                    autocomplete="name">
            </div>
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="regEmail" class="form-control" required placeholder="tu@email.com"
                    autocomplete="email">
            </div>
            <div class="form-group">
                <label>Número de Teléfono</label>
                <input type="tel" id="regPhone" class="form-control" placeholder="0999 123 456" autocomplete="tel">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="regPass" class="form-control" required placeholder="••••••••" minlength="6"
                    autocomplete="new-password">
                <div class="password-hint">Mínimo 6 caracteres</div>
            </div>
            <div class="form-group">
                <label>Confirmar Contraseña</label>
                <input type="password" id="regPassConfirm" class="form-control" required placeholder="••••••••"
                    autocomplete="new-password">
            </div>
            <button type="submit" id="submitBtn" class="btn-auth">
                <i class="fas fa-user-plus"></i> Crear Cuenta
            </button>
        </form>

        <div class="auth-footer">
            ¿Ya tienes cuenta? <a href="login.html">Inicia Sesión</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="/lib/supabase-client.js?v=1.0.1"></script>
    <script>
        const form = document.getElementById('registerForm');
        const btn = document.getElementById('submitBtn');
        const errorEl = document.getElementById('errorMsg');
        const successEl = document.getElementById('successMsg');

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            successEl.style.display = 'none';
        }
        function showSuccess(msg) {
            successEl.textContent = msg;
            successEl.style.display = 'block';
            errorEl.style.display = 'none';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.style.display = 'none';

            const fullName = document.getElementById('regFullName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const password = document.getElementById('regPass').value;
            const confirm = document.getElementById('regPassConfirm').value;

            if (password !== confirm) {
                showError('Las contraseñas no coinciden');
                return;
            }
            if (password.length < 6) {
                showError('La contraseña debe tener al menos 6 caracteres');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creando cuenta...';

            const { data, error } = await _supabase.auth.signUp({
                email,
                password,
                options: {
                    data: {
                        full_name: fullName,
                        first_name: fullName.split(' ')[0],
                        last_name: fullName.split(' ').slice(1).join(' '),
                        phone
                    }
                }
            });

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-user-plus"></i> Crear Cuenta';

            if (error) {
                const msg = error.message.includes('already registered')
                    ? 'Este correo ya está registrado. ¿Quieres iniciar sesión?'
                    : error.message;
                showError(msg);
                return;
            }

            // If email confirmations are enabled, show message
            // If disabled (recommended for dev), session is created immediately
            if (data.session) {
                showSuccess('¡Cuenta creada! Redirigiendo...');
                setTimeout(() => { location.href = 'index.html'; }, 800);
            } else {
                showSuccess('¡Cuenta creada! Revisa tu correo para confirmar tu cuenta y luego inicia sesión.');
                setTimeout(() => { location.href = 'login.html'; }, 3000);
            }
        });
    </script>
</body>

</html>
