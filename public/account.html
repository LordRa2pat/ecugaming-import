<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cuenta | Ecugaming Import</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: var(--bg-light);
            color: var(--text);
        }

        .account-layout {
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 2rem;
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }

        @media(max-width:760px) {
            .account-layout {
                grid-template-columns: 1fr;
            }

            .account-nav {
                display: flex;
                overflow-x: auto;
                gap: .5rem;
                padding-bottom: .5rem;
            }

            .nav-item {
                white-space: nowrap;
            }
        }

        /* Sidebar Nav */
        .account-nav {
            display: flex;
            flex-direction: column;
            gap: .3rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: .75rem;
            padding: .8rem 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            font-size: .88rem;
            font-weight: 600;
            color: var(--text-dim);
            transition: .15s;
            text-decoration: none;
            border: none;
            background: none;
            text-align: left;
            width: 100%;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
        }

        .nav-item.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .nav-item i {
            width: 18px;
            text-align: center;
        }

        .nav-avatar {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 1.2rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .nav-avatar .avatar-icon {
            font-size: 2.5rem;
            color: var(--primary);
        }

        .nav-avatar .avatar-name {
            font-size: .88rem;
            font-weight: 800;
            margin-top: .4rem;
            color: var(--text);
        }

        .nav-avatar .avatar-email {
            font-size: .75rem;
            color: var(--text-dim);
        }

        /* Content panels */
        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        .content-card {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 2rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-glass);
        }

        .content-card h3 {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 1.4rem;
            display: flex;
            align-items: center;
            gap: .5rem;
            color: var(--text);
        }

        .form-row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .8rem;
        }

        @media(max-width:500px) {
            .form-row-2 {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: .35rem;
            font-size: .85rem;
            font-weight: 600;
            color: var(--text-dim);
        }

        .form-control {
            width: 100%;
            padding: .85rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: .95rem;
            transition: .2s;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text);
        }

        .form-control:focus {
            border-color: var(--primary);
            outline: none;
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .btn-save {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: .85rem 2rem;
            font-weight: 800;
            cursor: pointer;
            transition: .2s;
            font-size: .95rem;
        }

        .btn-save:hover {
            opacity: .88;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .btn-save:disabled {
            opacity: .5;
            cursor: not-allowed;
        }

        .success-msg {
            background: rgba(52, 199, 89, 0.1);
            color: #34c759;
            border: 1px solid rgba(52, 199, 89, 0.2);
            border-radius: 10px;
            padding: .7rem 1rem;
            margin-bottom: 1rem;
            font-size: .88rem;
            display: none;
        }

        .error-msg {
            background: rgba(255, 59, 48, 0.1);
            color: #ff3b30;
            border: 1px solid rgba(255, 59, 48, 0.2);
            border-radius: 10px;
            padding: .7rem 1rem;
            margin-bottom: 1rem;
            font-size: .88rem;
            display: none;
        }

        /* Addresses */
        .address-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
        }

        .address-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 1.2rem;
            position: relative;
            transition: .2s;
        }

        .address-card.default-addr {
            border-color: var(--primary);
            background: rgba(0, 180, 216, 0.05);
        }

        .address-card .addr-label {
            font-size: .78rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: .05em;
            margin-bottom: .5rem;
        }

        .address-card .addr-city {
            font-size: 1rem;
            font-weight: 800;
            color: var(--text);
        }

        .address-card .addr-detail {
            font-size: .82rem;
            color: var(--text-dim);
            margin-top: .3rem;
            line-height: 1.4;
        }

        .addr-actions {
            display: flex;
            gap: .5rem;
            margin-top: 1rem;
        }

        .addr-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: .4rem .8rem;
            font-size: .78rem;
            font-weight: 700;
            cursor: pointer;
            color: var(--text);
            transition: .2s;
        }

        .addr-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--text-dim);
        }

        .addr-btn.del {
            color: #ff3b30;
            border-color: rgba(255, 59, 48, 0.3);
        }

        .addr-btn.del:hover {
            background: rgba(255, 59, 48, 0.1);
        }

        .default-badge {
            background: var(--primary);
            color: #fff;
            font-size: .7rem;
            font-weight: 800;
            border-radius: 20px;
            padding: 2px 8px;
        }

        .btn-add-addr {
            border: 2px dashed var(--border);
            border-radius: 14px;
            padding: 1.2rem;
            background: none;
            cursor: pointer;
            text-align: center;
            color: var(--text-dim);
            font-weight: 700;
            width: 100%;
            transition: .2s;
        }

        .btn-add-addr:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(0, 180, 216, 0.05);
        }

        .addr-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .7);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .addr-modal-overlay.show {
            display: flex;
        }

        .addr-modal {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            width: 95%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--border);
        }

        .addr-modal h3 {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 1.2rem;
            color: var(--text);
        }

        .modal-footer {
            display: flex;
            gap: .8rem;
            margin-top: 1rem;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: .85rem 1.4rem;
            font-weight: 700;
            cursor: pointer;
            color: var(--text);
        }

        /* Orders */
        .order-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .order-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 1.2rem;
            cursor: pointer;
            transition: .2s;
        }

        .order-card:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 20px rgba(0, 180, 216, 0.1);
            transform: translateY(-2px);
        }

        .order-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: .8rem;
            flex-wrap: wrap;
            gap: .5rem;
        }

        .order-id {
            font-size: .88rem;
            font-weight: 800;
            color: var(--text);
        }

        .order-date {
            font-size: .78rem;
            color: var(--text-dim);
        }

        .order-total {
            font-size: 1rem;
            font-weight: 900;
            color: var(--primary);
        }

        .status-chip {
            display: inline-block;
            font-size: .72rem;
            font-weight: 800;
            padding: 3px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: .04em;
        }

        .status-confirmando_pago {
            background: rgba(255, 193, 7, 0.15);
            color: #ffc107;
        }

        .status-orden_confirmada {
            background: rgba(13, 110, 253, 0.15);
            color: #0d6efd;
        }

        .status-empacando {
            background: rgba(102, 16, 242, 0.15);
            color: #6610f2;
        }

        .status-enviado {
            background: rgba(0, 123, 255, 0.15);
            color: #007bff;
        }

        .status-recibido {
            background: rgba(40, 167, 69, 0.15);
            color: #28a745;
        }

        .status-cancelado {
            background: rgba(220, 53, 69, 0.15);
            color: #dc3545;
        }

        .order-items-preview {
            display: flex;
            gap: .5rem;
            flex-wrap: wrap;
        }

        .order-item-thumb {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid var(--border);
            background: #222;
        }

        /* Order Detail Modal */
        .detail-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .7);
            z-index: 9999;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem 1rem;
            backdrop-filter: blur(4px);
        }

        .detail-modal-overlay.show {
            display: flex;
        }

        .detail-modal {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            width: 100%;
            max-width: 640px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            border: 1px solid var(--border);
        }

        .detail-close {
            position: absolute;
            top: 1rem;
            right: 1.2rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-dim);
            background: none;
            border: none;
        }

        /* Timeline */
        .timeline {
            padding: 0;
            list-style: none;
            position: relative;
            margin: 1rem 0;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 14px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border);
        }

        .tl-item {
            display: flex;
            gap: 1rem;
            align-items: flex-start;
            padding: .7rem 0;
            position: relative;
        }

        .tl-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            z-index: 1;
            font-size: .7rem;
        }

        .tl-dot.done {
            background: #34c759;
            border-color: #34c759;
            color: #fff;
        }

        .tl-dot.current {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        .tl-dot.pending {
            background: var(--card-bg);
            border-color: var(--border);
            color: var(--text-dim);
        }

        .tl-info {
            padding-top: .2rem;
        }

        .tl-label {
            font-size: .88rem;
            font-weight: 700;
            color: var(--text);
        }

        .tl-label.done {
            color: #34c759;
        }

        .tl-label.current {
            color: var(--primary);
        }

        .tl-label.pending {
            color: var(--text-dim);
        }

        /* Feature 10: Avatar initials */
        .avatar-initials {
            width: 56px; height: 56px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #0077b6);
            color: #fff; font-size: 1.4rem; font-weight: 900;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto .5rem;
            box-shadow: 0 4px 14px rgba(0,180,216,.35);
        }

        /* Feature 1: Stats banner in sidebar */
        .stats-banner {
            display: flex; flex-direction: column; gap: 4px;
            margin-top: .6rem; padding-top: .6rem;
            border-top: 1px solid rgba(255,255,255,.07);
        }
        .stat-chip-sm {
            font-size: .72rem; color: var(--text-dim); font-weight: 600;
            display: flex; align-items: center; gap: 5px;
        }
        .stat-chip-sm strong { color: var(--primary); font-weight: 800; }

        /* Feature 8: Referral card */
        .referral-card {
            background: linear-gradient(135deg, rgba(0,180,216,.1), rgba(0,119,182,.08));
            border: 1px solid rgba(0,180,216,.25);
            border-radius: 14px; padding: 1rem; margin-top: 1rem;
            text-align: center;
        }
        .referral-card p { font-size: .78rem; color: var(--text-dim); margin: 0 0 .6rem; }
        .referral-btn {
            display: inline-flex; align-items: center; gap: 6px;
            background: #25d366; color: #fff;
            border: none; border-radius: 8px;
            padding: 7px 14px; font-size: .78rem; font-weight: 800;
            cursor: pointer; text-decoration: none; transition: .18s;
        }
        .referral-btn:hover { opacity: .88; transform: scale(1.03); }

        /* Feature 4: Order filter */
        .order-search {
            display: flex; gap: .5rem; margin-bottom: 1rem;
        }
        .order-search input {
            flex: 1; padding: .6rem 1rem;
            background: rgba(255,255,255,.04);
            border: 1.5px solid var(--border);
            border-radius: 10px; color: var(--text);
            font-size: .85rem;
        }
        .order-search input:focus { border-color: var(--primary); outline: none; }

        /* Order action buttons */
        .order-actions {
            display: flex; gap: .5rem; margin-top: .7rem; flex-wrap: wrap;
        }
        .order-action-btn {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 5px 11px; border-radius: 7px; font-size: .75rem; font-weight: 700;
            border: 1px solid var(--border); cursor: pointer; transition: .15s;
            background: rgba(255,255,255,.04); color: var(--text-dim);
            text-decoration: none;
        }
        .order-action-btn:hover { background: rgba(255,255,255,.1); color: var(--text); }
        .order-action-btn.whatsapp { border-color: rgba(37,211,102,.3); color: #25d366; }
        .order-action-btn.whatsapp:hover { background: rgba(37,211,102,.1); }
        .order-action-btn.danger { border-color: rgba(255,59,48,.3); color: #ff3b30; }
        .order-action-btn.danger:hover { background: rgba(255,59,48,.08); }

        /* Feature 9: Password strength */
        .strength-bar {
            display: flex; gap: 4px; margin-top: .4rem; margin-bottom: .6rem;
        }
        .strength-seg {
            height: 4px; flex: 1; border-radius: 2px;
            background: rgba(255,255,255,.1); transition: background .2s;
        }
        .strength-label {
            font-size: .72rem; font-weight: 700; color: var(--text-dim);
            margin-top: .2rem;
        }

        /* Feature 7: Print receipt */
        @media print {
            body > *:not(.detail-modal-overlay) { display: none !important; }
            .detail-modal-overlay { display: block !important; position: static !important; background: none !important; }
            .detail-modal { box-shadow: none !important; border: none !important; max-height: none !important; }
            .detail-close, .modal-print-actions { display: none !important; }
        }

        /* Toast notification */
        #toast {
            position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
            background: #1e1e2e; border: 1px solid var(--border);
            color: #fff; padding: 8px 20px; border-radius: 980px;
            font-size: .82rem; font-weight: 700; z-index: 99999;
            opacity: 0; transition: opacity .25s; pointer-events: none;
        }
        #toast.show { opacity: 1; }
    </style>
</head>

<body>
    <header style="background: rgba(10, 10, 11, 0.9); border-bottom: 1px solid var(--border);">
        <div class="logo" onclick="location.href='/'" style="color: #fff;">Ecugaming <span style="color: #fff; opacity: 0.8;">Import</span></div>

        <div class="search-container" style="display:flex; align-items:center; background:rgba(255,255,255,0.08); border-radius:20px; padding:0 12px; height:36px; margin:0 1rem;">
            <i class="fa fa-search search-icon" style="color:#fff; opacity:0.7; font-size:14px;"></i>
            <input type="text" id="searchInput" placeholder="Buscar..." 
                onkeydown="if(event.key==='Enter') { if(window.handleSearch){ handleSearch(); } else { location.href='/?q='+encodeURIComponent(this.value); } }"
                style="background:transparent; border:none; color:#fff; margin-left:8px; outline:none; font-size:.9rem; width:100%;">
        </div>

        <div class="nav-actions" style="display:flex; align-items:center; gap:16px;">
            <div id="authArea" style="display:flex; gap:.5rem; align-items:center; color:#fff;"></div>
            <div onclick="if(window.toggleCart) toggleCart(true); else location.href='/checkout'" style="position:relative; cursor:pointer;">
                <i class="fa fa-shopping-bag" style="font-size:1.2rem; color:#fff;"></i>
                <span id="cartBadge" style="position:absolute; top:-5px; right:-8px; background:var(--accent); color:#fff; font-size:10px; padding:2px 5px; border-radius:50%; font-weight:800; display:none;">0</span>
            </div>
        </div>
    </header>

    <div class="account-layout">
        <!-- Sidebar -->
        <div>
            <div class="nav-avatar">
                <!-- Feature 10: Avatar initials -->
                <div class="avatar-initials" id="avatarInitials">?</div>
                <div class="avatar-name" id="navName">—</div>
                <div class="avatar-email" id="navEmail">—</div>
                <!-- Feature 1: Stats banner -->
                <div class="stats-banner" id="statsBanner" style="display:none;">
                    <div class="stat-chip-sm"><i class="fa fa-box" style="width:12px;"></i> <strong id="stOrders">0</strong> pedidos</div>
                    <div class="stat-chip-sm"><i class="fa fa-dollar-sign" style="width:12px;"></i> <strong id="stSpent">$0</strong> gastados</div>
                    <div class="stat-chip-sm"><i class="fa fa-tag" style="width:12px;"></i> <strong id="stSaved">$0</strong> ahorrados</div>
                </div>
            </div>
            <nav class="account-nav">
                <button class="nav-item active" onclick="switchTab('orders',this)">
                    <i class="fa fa-box"></i> Mis Pedidos
                </button>
                <button class="nav-item" onclick="switchTab('profile',this)">
                    <i class="fa fa-user"></i> Mi Perfil
                </button>
                <button class="nav-item" onclick="switchTab('addresses',this)">
                    <i class="fa fa-map-marker-alt"></i> Direcciones
                </button>
                <button class="nav-item" onclick="switchTab('security',this)">
                    <i class="fa fa-lock"></i> Seguridad
                </button>
                <a class="nav-item" href="/solicitud-credito" style="color:#a855f7; text-decoration:none;">
                    <i class="fa fa-credit-card"></i> Solicitar Crédito
                </a>
                <button class="nav-item" onclick="Auth.signOut()" style="color:#ef4444; margin-top:auto;">
                    <i class="fa fa-sign-out-alt"></i> Cerrar Sesión
                </button>
            </nav>
            <!-- Feature 8: Referral share card -->
            <div class="referral-card">
                <p>¡Comparte la tienda con tus amigos!</p>
                <a class="referral-btn" href="https://wa.me/?text=Compra%20gaming%20en%20Ecuador%20con%20los%20mejores%20precios%3A%20https%3A%2F%2Fecugamingimport.online" target="_blank">
                    <i class="fab fa-whatsapp"></i> Compartir
                </a>
            </div>
        </div>

        <!-- Content -->
        <div>
            <!-- Orders Tab -->
            <div class="tab-panel active" id="tab-orders">
                <div class="content-card">
                    <h3><i class="fa fa-box" style="color:var(--primary);"></i> Mis Pedidos</h3>
                    <!-- Feature 4: Order search/filter -->
                    <div class="order-search">
                        <input type="text" id="orderSearchInput" placeholder="Buscar por ID o producto..." oninput="filterOrders(this.value)">
                    </div>
                    <div id="orderList" class="order-list">
                        <p style="color:var(--text-dim);">Cargando pedidos...</p>
                    </div>
                </div>
            </div>

            <!-- Profile Tab -->
            <div class="tab-panel" id="tab-profile">
                <div class="content-card">
                    <h3><i class="fa fa-user" style="color:var(--primary);"></i> Mi Perfil</h3>
                    <div id="profileSuccessMsg" class="success-msg"></div>
                    <div id="profileErrorMsg" class="error-msg"></div>
                    <div class="form-row-2">
                        <div class="form-group">
                            <label>Nombres</label>
                            <input type="text" id="profFirst" class="form-control" placeholder="Juan">
                        </div>
                        <div class="form-group">
                            <label>Apellidos</label>
                            <input type="text" id="profLast" class="form-control" placeholder="Pérez">
                        </div>
                    </div>
                    <div class="form-row-2">
                        <div class="form-group">
                            <label>Teléfono</label>
                            <input type="tel" id="profPhone" class="form-control" placeholder="0999 123 456">
                        </div>
                        <div class="form-group">
                            <label>Cédula</label>
                            <input type="text" id="profCedula" class="form-control" placeholder="1712345678">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Correo Electrónico</label>
                        <input type="email" id="profEmail" class="form-control" disabled
                            style="opacity:.6; cursor:not-allowed;">
                        <small style="font-size:.75rem; color:var(--text-dim);">El correo no puede modificarse
                            aquí.</small>
                    </div>
                    <button class="btn-save" id="btnSaveProfile" onclick="saveProfile()">
                        <i class="fa fa-save"></i> Guardar Cambios
                    </button>
                </div>
            </div>

            <!-- Addresses Tab -->
            <div class="tab-panel" id="tab-addresses">
                <div class="content-card">
                    <h3><i class="fa fa-map-marker-alt" style="color:var(--primary);"></i> Mis Direcciones</h3>
                    <div id="addressGrid" class="address-grid"></div>
                </div>
            </div>

            <!-- Security Tab -->
            <div class="tab-panel" id="tab-security">
                <div class="content-card">
                    <h3><i class="fa fa-lock" style="color:var(--primary);"></i> Cambiar Contraseña</h3>
                    <div id="secSuccessMsg" class="success-msg"></div>
                    <div id="secErrorMsg" class="error-msg"></div>
                    <div class="form-group">
                        <label>Nueva Contraseña</label>
                        <input type="password" id="newPassword" class="form-control" placeholder="Mínimo 6 caracteres"
                            minlength="6" oninput="updateStrength(this.value)">
                        <!-- Feature 9: Password strength -->
                        <div class="strength-bar">
                            <div class="strength-seg" id="seg1"></div>
                            <div class="strength-seg" id="seg2"></div>
                            <div class="strength-seg" id="seg3"></div>
                        </div>
                        <div class="strength-label" id="strengthLabel"></div>
                    </div>
                    <div class="form-group">
                        <label>Confirmar Nueva Contraseña</label>
                        <input type="password" id="confirmPassword" class="form-control"
                            placeholder="Repite la contraseña">
                    </div>
                    <button class="btn-save" id="btnChangePass" onclick="changePassword()">
                        <i class="fa fa-shield-alt"></i> Actualizar Contraseña
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Address Form Modal -->
    <div class="addr-modal-overlay" id="addrModal">
        <div class="addr-modal">
            <h3 id="addrModalTitle">Nueva Dirección</h3>
            <input type="hidden" id="addrEditId">
            <div class="form-group">
                <label>Etiqueta (Casa, Trabajo...)</label>
                <input type="text" id="addrLabel" class="form-control" placeholder="Casa" value="Casa">
            </div>
            <div class="form-row-2">
                <div class="form-group">
                    <label>Provincia *</label>
                    <input type="text" id="addrProvince" class="form-control" placeholder="Sucumbíos">
                </div>
                <div class="form-group">
                    <label>Ciudad *</label>
                    <input type="text" id="addrCity" class="form-control" placeholder="Lago Agrio">
                </div>
            </div>
            <div class="form-group">
                <label>Dirección *</label>
                <input type="text" id="addrAddr1" class="form-control" placeholder="Calle y número">
            </div>
            <div class="form-group">
                <label>Referencia</label>
                <input type="text" id="addrRef" class="form-control" placeholder="Cerca de...">
            </div>
            <div class="form-group" style="display:flex; align-items:center; gap:.7rem;">
                <input type="checkbox" id="addrDefault" style="width:auto;">
                <label for="addrDefault" style="margin:0; cursor:pointer;">Establecer como predeterminada</label>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeAddrModal()">Cancelar</button>
                <button class="btn-save" onclick="saveAddress()"><i class="fa fa-save"></i> Guardar</button>
            </div>
        </div>
    </div>

    <!-- Order Detail Modal -->
    <div class="detail-modal-overlay" id="detailModal">
        <div class="detail-modal">
            <button class="detail-close" onclick="closeDetailModal()">&times;</button>
            <div id="detailContent"></div>
            <!-- Feature 6+7: Copy ID + Print receipt actions -->
            <div class="modal-print-actions" id="modalPrintActions" style="display:none; gap:.6rem; margin-top:1rem; padding-top:1rem; border-top:1px solid var(--border);">
                <button onclick="copyOrderId()" class="order-action-btn">
                    <i class="fa fa-copy"></i> Copiar ID
                </button>
                <button onclick="printReceipt()" class="order-action-btn">
                    <i class="fa fa-print"></i> Imprimir recibo
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="/lib/supabase-client.js"></script>
    <script src="/lib/auth.js"></script>
    <script>
        let userSession = null;
        let userProfile = null;
        let orders = [];
        let addresses = [];
        let currentOrderId = '';

        // Toast helper
        function showToast(msg, ms = 2000) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), ms);
        }

        const STATUS_STEPS = [
            { key: 'confirmando_pago', label: 'Confirmando Pago', icon: 'fa-receipt' },
            { key: 'orden_confirmada', label: 'Orden Confirmada', icon: 'fa-check-circle' },
            { key: 'empacando', label: 'Empacando', icon: 'fa-box' },
            { key: 'enviado', label: 'Enviado', icon: 'fa-truck' },
            { key: 'recibido', label: 'Recibido', icon: 'fa-handshake' }
        ];

        async function init() {
            userSession = await Auth.requireAuth('login.html');
            if (!userSession) return;
            await Auth.updateAuthUI();
            await loadProfile();
            loadOrders();
        }

        async function loadProfile() {
            const res = await fetch('/api/me', {
                headers: { 'Authorization': 'Bearer ' + userSession.access_token }
            });
            userProfile = await res.json();

            const fullName = `${userProfile.first_name || ''} ${userProfile.last_name || ''}`.trim();
            document.getElementById('navName').textContent = fullName || userProfile.email;
            document.getElementById('navEmail').textContent = userProfile.email;
            // Feature 10: Avatar initials
            const initials = ((userProfile.first_name || '?')[0] + (userProfile.last_name || '')[0]).toUpperCase();
            document.getElementById('avatarInitials').textContent = initials;
            document.getElementById('profFirst').value = userProfile.first_name || '';
            document.getElementById('profLast').value = userProfile.last_name || '';
            document.getElementById('profPhone').value = userProfile.phone || '';
            document.getElementById('profCedula').value = userProfile.cedula || '';
            document.getElementById('profEmail').value = userProfile.email || '';

            addresses = userProfile.addresses || [];
            renderAddresses();
        }

        async function loadOrders() {
            const res = await fetch('/api/my-orders', {
                headers: { 'Authorization': 'Bearer ' + userSession.access_token }
            });
            orders = await res.json();
            renderOrders();
            // Feature 1: Compute and show stats banner
            if (Array.isArray(orders) && orders.length) {
                const totalSpent = orders.reduce((s, o) => s + Number(o.total || 0), 0);
                const totalSaved = orders.reduce((s, o) => s + Number(o.discount_total || 0), 0);
                document.getElementById('stOrders').textContent = orders.length;
                document.getElementById('stSpent').textContent = '$' + totalSpent.toFixed(0);
                document.getElementById('stSaved').textContent = '$' + totalSaved.toFixed(0);
                document.getElementById('statsBanner').style.display = 'flex';
            }
        }

        function renderOrders(filtered) {
            const list = filtered !== undefined ? filtered : orders;
            const container = document.getElementById('orderList');
            if (!list || !list.length) {
                container.innerHTML = '<p style="color:var(--text-dim); text-align:center; padding:2rem;">Aún no tienes pedidos. <a href="/" style="color:var(--primary); font-weight:700;">¡Empieza a comprar!</a></p>';
                return;
            }
            container.innerHTML = list.map(o => {
                const date = new Date(o.created_at).toLocaleDateString('es-EC', { year: 'numeric', month: 'short', day: 'numeric' });
                const items = o.items || [];
                const thumbs = items.slice(0, 4).map(i => {
                    const img = i.product_snapshot?.image_url || 'https://via.placeholder.com/40';
                    return `<img class="order-item-thumb" src="${img}" alt="${i.product_snapshot?.name || ''}" onerror="this.src='https://via.placeholder.com/40'">`;
                }).join('');
                const waUrl = `https://wa.me/593962609951?text=${encodeURIComponent('Consulta sobre el pedido #' + o.id)}`;
                const reorderData = encodeURIComponent(JSON.stringify(items.map(i => ({ id: i.product_id, name: i.product_snapshot?.name, price: i.unit_price, image_url: i.product_snapshot?.image_url, qty: i.qty }))));
                return `
                <div class="order-card">
                    <div class="order-card-header" onclick="showOrderDetail('${o.id}')">
                        <div>
                            <div class="order-id">${o.id}</div>
                            <div class="order-date">${date}</div>
                        </div>
                        <div style="text-align:right;">
                            <span class="status-chip status-${o.status}">${statusLabel(o.status)}</span>
                            <div class="order-total" style="margin-top:.3rem;">$${Number(o.total).toFixed(2)}</div>
                        </div>
                    </div>
                    <div class="order-items-preview" style="margin-top:.6rem;" onclick="showOrderDetail('${o.id}')">${thumbs}</div>
                    ${o.tracking_code ? `<div style="margin-top:.5rem; font-size:.78rem; color:var(--text-dim);"><i class="fa fa-truck"></i> Guía: <strong>${o.tracking_code}</strong></div>` : ''}
                    <!-- Features 2,3,5: Action buttons per order -->
                    <div class="order-actions">
                        <a href="${waUrl}" target="_blank" class="order-action-btn whatsapp">
                            <i class="fab fa-whatsapp"></i> Consultar
                        </a>
                        <button class="order-action-btn" onclick='reorderItems("${o.id}")'>
                            <i class="fa fa-redo"></i> Reordenar
                        </button>
                        ${o.status === 'confirmando_pago' ? `<a href="https://wa.me/593962609951?text=${encodeURIComponent('Quiero cancelar el pedido #' + o.id)}" target="_blank" class="order-action-btn danger"><i class="fa fa-times"></i> Cancelar</a>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        // Feature 4: Order filter
        function filterOrders(query) {
            if (!query.trim()) { renderOrders(); return; }
            const q = query.toLowerCase();
            const filtered = orders.filter(o => {
                if (o.id.toLowerCase().includes(q)) return true;
                return (o.items || []).some(i => (i.product_snapshot?.name || '').toLowerCase().includes(q));
            });
            renderOrders(filtered);
        }

        // Feature 2: Reorder
        function reorderItems(orderId) {
            const order = orders.find(o => o.id === orderId);
            if (!order) return;
            const cart = JSON.parse(localStorage.getItem('eg_cart') || '[]');
            for (const item of (order.items || [])) {
                const existing = cart.find(c => c.id === item.product_id);
                if (existing) existing.qty = (existing.qty || 1) + (item.qty || 1);
                else cart.push({ id: item.product_id, name: item.product_snapshot?.name, price: item.unit_price, image_url: item.product_snapshot?.image_url, qty: item.qty || 1 });
            }
            localStorage.setItem('eg_cart', JSON.stringify(cart));
            showToast('✓ Productos agregados al carrito');
            setTimeout(() => location.href = 'checkout.html', 1200);
        }

        function statusLabel(s) {
            const map = { confirmando_pago: 'Confirmando pago', orden_confirmada: 'Confirmada', empacando: 'Empacando', enviado: 'Enviado', recibido: 'Recibido', cancelado: 'Cancelado' };
            return map[s] || s;
        }

        async function showOrderDetail(orderId) {
            currentOrderId = orderId;
            document.getElementById('detailContent').innerHTML = '<div style="text-align:center; padding:2rem;"><i class="fa fa-spinner fa-spin fa-2x" style="color:var(--text-dim);"></i></div>';
            document.getElementById('modalPrintActions').style.display = 'none';
            document.getElementById('detailModal').classList.add('show');

            const res = await fetch(`/api/orders/${orderId}`, {
                headers: { 'Authorization': 'Bearer ' + userSession.access_token }
            });
            const order = await res.json();
            if (!res.ok) {
                document.getElementById('detailContent').innerHTML = `<p style="color:#ef4444;">${order.error}</p>`;
                return;
            }

            const date = new Date(order.created_at).toLocaleString('es-EC');
            const addr = order.shipping_address || {};
            const items = (order.items || []).map(i => `
                <div style="display:flex; gap:.8rem; align-items:center; padding:.6rem 0; border-bottom:1px solid #f0f0f5;">
                    <img src="${i.product_snapshot?.image_url || 'https://via.placeholder.com/40'}" style="width:44px; height:44px; border-radius:8px; object-fit:cover;" onerror="this.src='https://via.placeholder.com/40'">
                    <div style="flex:1;">
                        <div style="font-size:.88rem; font-weight:700;">${i.product_snapshot?.name || '—'}</div>
                        <div style="font-size:.78rem; color:var(--text-dim);">x${i.qty} · $${Number(i.unit_price).toFixed(2)}</div>
                    </div>
                    <div style="font-weight:800; font-size:.9rem;">$${Number(i.line_total).toFixed(2)}</div>
                </div>`).join('');

            // Timeline
            const events = order.events || [];
            const currentStatusIdx = STATUS_STEPS.findIndex(s => s.key === order.status);
            const timelineHTML = STATUS_STEPS.map((step, idx) => {
                const event = events.find(e => e.status === step.key);
                let state = 'pending';
                if (idx < currentStatusIdx) state = 'done';
                if (idx === currentStatusIdx) state = 'current';
                return `
                <li class="tl-item">
                    <div class="tl-dot ${state}"><i class="fa ${step.icon}" style="font-size:.65rem;"></i></div>
                    <div class="tl-info">
                        <div class="tl-label ${state}">${step.label}</div>
                        ${event ? `<div class="tl-date">${new Date(event.created_at).toLocaleString('es-EC')}</div>` : ''}
                        ${event?.note ? `<div class="tl-note">${event.note}</div>` : ''}
                    </div>
                </li>`;
            }).join('');

            document.getElementById('detailContent').innerHTML = `
                <h3 style="font-size:1.1rem; font-weight:800; margin-bottom:.5rem;">${order.id}</h3>
                <p style="font-size:.78rem; color:var(--text-dim); margin-bottom:1.5rem;">${date}</p>

                <div style="display:flex; gap:.6rem; flex-wrap:wrap; margin-bottom:1.5rem;">
                    <span class="status-chip status-${order.status}">${statusLabel(order.status)}</span>
                    ${order.coupon_code ? `<span style="background:#f0fff4; color:#27ae60; font-size:.72rem; font-weight:800; padding:3px 10px; border-radius:20px; border:1px solid #b2dfdb;">Cupón: ${order.coupon_code}</span>` : ''}
                </div>

                <div style="background:#f8fafc; border-radius:12px; padding:1rem; margin-bottom:1.5rem;">
                    <div style="font-size:.85rem; font-weight:800; margin-bottom:.6rem;"><i class="fa fa-map-marker-alt"></i> Envío</div>
                    <div style="font-size:.82rem; color:var(--text);">${addr.firstName || ''} ${addr.lastName || ''}</div>
                    <div style="font-size:.78rem; color:var(--text-dim);">${addr.address1 || ''}, ${addr.city || ''}, ${addr.province || ''}</div>
                    ${order.carrier ? `<div style="font-size:.78rem; color:var(--text-dim); margin-top:.3rem;"><i class="fa fa-truck"></i> ${order.carrier}${order.carrier_agency_name ? ' · ' + order.carrier_agency_name : ''}</div>` : ''}
                    ${order.tracking_code ? `<div style="font-size:.82rem; font-weight:700; color:var(--primary); margin-top:.3rem;"><i class="fa fa-box"></i> Guía: ${order.tracking_code}</div>` : ''}
                </div>

                <div style="margin-bottom:1.5rem;">${items}</div>

                <div style="background:#f8fafc; border-radius:12px; padding:1rem; margin-bottom:1.5rem; font-size:.88rem;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:.3rem;"><span>Subtotal</span><span>$${Number(order.subtotal).toFixed(2)}</span></div>
                    ${order.discount_total > 0 ? `<div style="display:flex; justify-content:space-between; margin-bottom:.3rem; color:#27ae60; font-weight:700;"><span>Descuento</span><span>-$${Number(order.discount_total).toFixed(2)}</span></div>` : ''}
                    <div style="display:flex; justify-content:space-between; margin-bottom:.3rem;"><span>Envío</span><span>${Number(order.shipping_total) === 0 ? 'GRATIS' : '$' + Number(order.shipping_total).toFixed(2)}</span></div>
                    <div style="display:flex; justify-content:space-between; font-weight:900; font-size:1rem; border-top:1px solid var(--border); margin-top:.6rem; padding-top:.6rem;"><span>Total</span><span>$${Number(order.total).toFixed(2)}</span></div>
                </div>

                <div style="margin-bottom:1rem;">
                    <div style="font-size:.88rem; font-weight:800; margin-bottom:.8rem;"><i class="fa fa-list-check"></i> Estado del Pedido</div>
                    <ul class="timeline">${timelineHTML}</ul>
                </div>`;
            // Feature 6+7: Show print/copy actions
            document.getElementById('modalPrintActions').style.display = 'flex';
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('show');
        }

        // Feature 6: Copy order ID
        function copyOrderId() {
            navigator.clipboard.writeText(currentOrderId).then(() => showToast('ID copiado: ' + currentOrderId));
        }

        // Feature 7: Print receipt
        function printReceipt() { window.print(); }

        // Feature 9: Password strength indicator
        function updateStrength(val) {
            const hasNum = /\d/.test(val);
            const hasSpec = /[^a-zA-Z0-9]/.test(val);
            let strength = 0;
            if (val.length >= 6) strength = 1;
            if (val.length >= 8 && hasNum) strength = 2;
            if (val.length >= 8 && hasNum && hasSpec) strength = 3;
            const colors = ['', '#ff453a', '#ff9500', '#34c759'];
            const labels = ['', 'Débil', 'Media', 'Fuerte'];
            for (let i = 1; i <= 3; i++) {
                document.getElementById('seg' + i).style.background = i <= strength ? colors[strength] : 'rgba(255,255,255,.1)';
            }
            document.getElementById('strengthLabel').textContent = val.length ? labels[strength] : '';
            document.getElementById('strengthLabel').style.color = colors[strength] || 'var(--text-dim)';
        }

        // Profile save
        async function saveProfile() {
            const btn = document.getElementById('btnSaveProfile');
            const successEl = document.getElementById('profileSuccessMsg');
            const errorEl = document.getElementById('profileErrorMsg');
            btn.disabled = true;
            successEl.style.display = errorEl.style.display = 'none';

            const res = await fetch('/api/me', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + userSession.access_token
                },
                body: JSON.stringify({
                    first_name: document.getElementById('profFirst').value.trim(),
                    last_name: document.getElementById('profLast').value.trim(),
                    phone: document.getElementById('profPhone').value.trim(),
                    cedula: document.getElementById('profCedula').value.trim()
                })
            });
            btn.disabled = false;
            if (res.ok) {
                successEl.textContent = '¡Perfil actualizado correctamente!';
                successEl.style.display = 'block';
                await loadProfile();
            } else {
                const data = await res.json();
                errorEl.textContent = data.error || 'Error actualizando perfil';
                errorEl.style.display = 'block';
            }
        }

        // Change password
        async function changePassword() {
            const btn = document.getElementById('btnChangePass');
            const successEl = document.getElementById('secSuccessMsg');
            const errorEl = document.getElementById('secErrorMsg');
            const pass = document.getElementById('newPassword').value;
            const conf = document.getElementById('confirmPassword').value;
            successEl.style.display = errorEl.style.display = 'none';

            if (pass.length < 6) { errorEl.textContent = 'Mínimo 6 caracteres.'; errorEl.style.display = 'block'; return; }
            if (pass !== conf) { errorEl.textContent = 'Las contraseñas no coinciden.'; errorEl.style.display = 'block'; return; }

            btn.disabled = true;
            const { error } = await _supabase.auth.updateUser({ password: pass });
            btn.disabled = false;
            if (error) {
                errorEl.textContent = error.message;
                errorEl.style.display = 'block';
            } else {
                successEl.textContent = '¡Contraseña actualizada!';
                successEl.style.display = 'block';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
            }
        }

        // Addresses
        function renderAddresses() {
            const grid = document.getElementById('addressGrid');
            const cards = addresses.map((addr, i) => `
                <div class="address-card ${addr.is_default ? 'default-addr' : ''}">
                    <div class="addr-label">${addr.label || 'Dirección'} ${addr.is_default ? '<span class="default-badge">Predeterminada</span>' : ''}</div>
                    <div class="addr-city">${addr.city}, ${addr.province}</div>
                    <div class="addr-detail">${addr.address1}${addr.reference ? '<br>' + addr.reference : ''}</div>
                    <div class="addr-actions">
                        <button class="addr-btn" onclick='editAddress(${i})'>Editar</button>
                        ${!addr.is_default ? `<button class="addr-btn" onclick='setDefaultAddress("${addr.id}")'>Predeterminar</button>` : ''}
                        <button class="addr-btn del" onclick='deleteAddress("${addr.id}")'>Eliminar</button>
                    </div>
                </div>`).join('');
            grid.innerHTML = cards + `<button class="btn-add-addr" onclick="openAddrModal()"><i class="fa fa-plus" style="margin-right:.5rem;"></i> Nueva dirección</button>`;
        }

        function openAddrModal(addr) {
            document.getElementById('addrModalTitle').textContent = addr ? 'Editar Dirección' : 'Nueva Dirección';
            document.getElementById('addrEditId').value = addr?.id || '';
            document.getElementById('addrLabel').value = addr?.label || 'Casa';
            document.getElementById('addrProvince').value = addr?.province || '';
            document.getElementById('addrCity').value = addr?.city || '';
            document.getElementById('addrAddr1').value = addr?.address1 || '';
            document.getElementById('addrRef').value = addr?.reference || '';
            document.getElementById('addrDefault').checked = addr?.is_default || false;
            document.getElementById('addrModal').classList.add('show');
        }

        function editAddress(idx) { openAddrModal(addresses[idx]); }
        function closeAddrModal() { document.getElementById('addrModal').classList.remove('show'); }

        async function saveAddress() {
            const editId = document.getElementById('addrEditId').value;
            const payload = {
                label: document.getElementById('addrLabel').value.trim() || 'Casa',
                province: document.getElementById('addrProvince').value.trim(),
                city: document.getElementById('addrCity').value.trim(),
                address1: document.getElementById('addrAddr1').value.trim(),
                reference: document.getElementById('addrRef').value.trim(),
                is_default: document.getElementById('addrDefault').checked,
                user_id: userSession.user.id
            };
            if (!payload.province || !payload.city || !payload.address1) {
                alert('Provincia, ciudad y dirección son requeridos.'); return;
            }

            if (payload.is_default) {
                await _supabase.from('addresses').update({ is_default: false }).eq('user_id', userSession.user.id);
            }

            let err;
            if (editId) {
                ({ error: err } = await _supabase.from('addresses').update(payload).eq('id', editId));
            } else {
                ({ error: err } = await _supabase.from('addresses').insert(payload));
            }

            if (err) { alert('Error guardando dirección: ' + err.message); return; }
            closeAddrModal();
            await loadProfile();
        }

        async function setDefaultAddress(id) {
            await _supabase.from('addresses').update({ is_default: false }).eq('user_id', userSession.user.id);
            await _supabase.from('addresses').update({ is_default: true }).eq('id', id);
            await loadProfile();
        }

        async function deleteAddress(id) {
            if (!confirm('¿Eliminar esta dirección?')) return;
            await _supabase.from('addresses').delete().eq('id', id);
            await loadProfile();
        }

        // Tab switching
        function switchTab(tab, btn) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            if (btn) btn.classList.add('active');
        }

        init();
    </script>
</body>

</html>
