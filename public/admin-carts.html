<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carritos | Ecugaming Import</title>
    <link rel="stylesheet" href="style.css?v=1.0.6">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: var(--secondary); color: var(--bg-light); }
        .admin-layout { min-height: 100vh; background: #000; }
        .admin-sidebar {
            background: #050505; border-right: 1px solid rgba(255,255,255,0.08);
            padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 0.2rem;
            overflow-y: auto; position: fixed; left: 0; top: 0;
            height: 100vh; width: 280px; z-index: 1100;
        }
        .sidebar-brand { padding: 0 1rem 2rem; font-size: 1.2rem; font-weight: 900; color: var(--white); display: flex; align-items: center; gap: 10px; }
        .sidebar-brand span { color: var(--primary); }
        .sidebar-group { font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin: 1.5rem 1rem 0.5rem; }
        .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-radius: 10px; cursor: pointer; font-size: 13.5px; font-weight: 500; color: #a1a1aa; text-decoration: none; transition: 0.2s; border: none; background: none; width: 100%; text-align: left; }
        .sidebar-item:hover { background: rgba(255,255,255,0.04); color: var(--white); }
        .sidebar-item.active { background: var(--primary) !important; color: #fff !important; box-shadow: 0 4px 12px var(--primary-glow); font-weight: 700; }
        .sidebar-footer { margin-top: auto; padding: 1rem 0 0; border-top: 1px solid rgba(255,255,255,.06); }
        .sidebar-item-danger { color: #ff6b6b !important; }
        .sidebar-item-danger:hover { background: rgba(255,107,107,.1) !important; }
        .admin-content { padding: 2.5rem; overflow-x: auto; background: var(--bg-light); margin-left: 280px; min-height: 100vh; }
        .admin-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .admin-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; }
        .admin-table th { padding: 12px 16px; background: rgba(255,255,255,0.02); color: var(--text-dim); font-weight: 600; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
        .admin-table td { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.03); color: #e2e2e7; vertical-align: middle; }
        .status-chip { display: inline-block; font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 8px; text-transform: uppercase; }
        .s-pendiente { background: rgba(245,158,11,0.15); color: #f59e0b; }
        .s-recibido { background: rgba(52,199,89,0.1); color: #34c759; }
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 1.2rem 1.5rem; }
        .stat-label { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
        .stat-value { font-size: 1.8rem; font-weight: 900; color: #fff; }
        .items-list { display: flex; flex-wrap: wrap; gap: 4px; }
        .item-chip { background: rgba(167,139,250,0.1); border: 1px solid rgba(167,139,250,0.2); border-radius: 6px; padding: 3px 8px; font-size: 11px; color: #a78bfa; }
    </style>
</head>
<body>
<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="sidebar-brand">🎮 Ecugaming <span>Import</span></div>
        <div class="sidebar-group">Principal</div>
        <a href="admin.html" class="sidebar-item"><i class="fa fa-th-large"></i> Dashboard</a>
        <a href="admin-products.html" class="sidebar-item"><i class="fa fa-box"></i> Inventario</a>
        <a href="admin-orders.html" class="sidebar-item"><i class="fa fa-shopping-cart"></i> Ventas</a>
        <a href="admin-customers.html" class="sidebar-item"><i class="fa fa-users"></i> Clientes</a>
        <div class="sidebar-group">Marketing</div>
        <a href="admin-coupons.html" class="sidebar-item"><i class="fa fa-ticket-alt"></i> Cupones</a>
        <a href="admin-carts.html" class="sidebar-item active"><i class="fa fa-shopping-basket"></i> Carritos</a>
        <div class="sidebar-group">Configuración</div>
        <a href="admin-settings.html" class="sidebar-item"><i class="fa fa-cog"></i> Ajustes</a>
        <div class="sidebar-footer">
            <button class="sidebar-item sidebar-item-danger" onclick="signOutAdmin()"><i class="fa fa-sign-out-alt"></i> Cerrar Sesión</button>
        </div>
    </aside>

    <div class="admin-content">
        <div class="page-header">
            <h2 style="font-size:1.3rem;font-weight:800;color:#f5f5f7;margin:0;">Carritos Activos</h2>
            <button onclick="loadCarts()" style="background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;padding:8px 16px;color:#e2e2e7;cursor:pointer;font-size:13px;">
                <i class="fa fa-sync"></i> Actualizar
            </button>
        </div>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-label">Órdenes Pendientes</div>
                <div class="stat-value" id="statPending">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total en Carritos</div>
                <div class="stat-value" id="statTotal">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Clientes Activos</div>
                <div class="stat-value" id="statClients">—</div>
            </div>
        </div>

        <div class="admin-card">
            <div style="overflow-x:auto;">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Email</th>
                            <th>Productos</th>
                            <th>Total</th>
                            <th>Método Pago</th>
                            <th>Fecha</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="cartsBody">
                        <tr><td colspan="7" style="text-align:center;color:#555;padding:3rem;">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/lib/supabase-client.js?v=1.0.6"></script>
<script src="/lib/auth.js?v=1.0.6"></script>
<script>
    let adminToken = '';
    async function init() {
        adminToken = await Auth.requireAdmin();
        if (!adminToken) return;
        loadCarts();
    }

    async function apiFetch(url, opts = {}) {
        return fetch(url, {
            ...opts,
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminToken, ...(opts.headers || {}) }
        });
    }

    async function signOutAdmin() { await _supabase.auth.signOut(); location.href = 'login.html'; }

    async function loadCarts() {
        const res = await apiFetch('/api/admin/orders?status=pendiente&limit=100');
        const data = await res.json();
        const orders = Array.isArray(data) ? data : (data.orders || []);
        const tbody = document.getElementById('cartsBody');

        if (!orders.length) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#555;padding:3rem;"><i class="fa fa-shopping-basket" style="font-size:2rem;display:block;margin-bottom:1rem;"></i>No hay carritos pendientes</td></tr>';
            document.getElementById('statPending').textContent = '0';
            document.getElementById('statTotal').textContent = '$0';
            document.getElementById('statClients').textContent = '0';
            return;
        }

        const totalVal = orders.reduce((s, o) => s + parseFloat(o.total || 0), 0);
        const uniqueClients = new Set(orders.map(o => o.customer_id || o.customer?.email)).size;
        document.getElementById('statPending').textContent = orders.length;
        document.getElementById('statTotal').textContent = '$' + totalVal.toFixed(2);
        document.getElementById('statClients').textContent = uniqueClients;

        tbody.innerHTML = orders.map(o => {
            const customer = o.customer || {};
            const name = [customer.first_name, customer.last_name].filter(Boolean).join(' ') || '—';
            const items = o.items || o.order_items || [];
            const itemsHtml = items.length
                ? items.map(i => `<span class="item-chip">${i.name || i.product?.name || 'Producto'} ×${i.quantity || i.qty || 1}</span>`).join('')
                : '<span style="color:#555">Sin detalle</span>';
            const date = o.created_at ? new Date(o.created_at).toLocaleDateString('es-EC', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }) : '—';
            return `
                <tr>
                    <td style="font-weight:700;">${name}</td>
                    <td style="color:#8888a0;font-size:12px;">${customer.email || '—'}</td>
                    <td><div class="items-list">${itemsHtml}</div></td>
                    <td style="font-weight:800;color:#a78bfa;">$${parseFloat(o.total || 0).toFixed(2)}</td>
                    <td style="font-size:12px;">${o.payment_method || '—'}</td>
                    <td style="font-size:12px;color:#8888a0;">${date}</td>
                    <td><span class="status-chip s-pendiente">${o.status || 'pendiente'}</span></td>
                </tr>`;
        }).join('');
    }

    init();
</script>
</body>
</html>
