<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajustes | Ecugaming Import</title>
    <link rel="stylesheet" href="style.css?v=1.0.6">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: var(--secondary);
            color: var(--bg-light);
            font-feature-settings: "cv11", "ss01";
        }

        .admin-layout {
            min-height: 100vh;
            background: #000;
        }

        .admin-sidebar {
            background: #050505;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            overflow-y: auto;
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: 280px;
            z-index: 1100;
        }

        .sidebar-brand {
            padding: 0 1rem 2rem;
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--white);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-brand span {
            color: var(--primary);
        }

        .sidebar-group {
            font-size: 10px;
            font-weight: 800;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 1.5rem 1rem 0.5rem;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13.5px;
            font-weight: 500;
            color: #a1a1aa;
            text-decoration: none;
            transition: 0.2s;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }

        .sidebar-item:hover {
            background: rgba(255, 255, 255, 0.04);
            color: var(--white);
        }

        .sidebar-item.active {
            background: var(--primary) !important;
            color: #fff !important;
            box-shadow: 0 4px 12px var(--primary-glow);
            font-weight: 700;
        }

        .admin-content {
            padding: 2.5rem;
            overflow-x: auto;
            background: var(--bg-light);
            margin-left: 280px;
            min-height: 100vh;
        }

        .admin-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-glass);
        }

        .form-control {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--white);
            padding: 12px 16px;
            font-size: 14px;
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: #e2e2e7;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-action.primary {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
            font-weight: 600;
        }

        .form-row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-brand">Ecugaming <span>Import</span></div>
            <div class="sidebar-group">Principal</div>
            <a href="admin.html" class="sidebar-item"><i class="fa fa-th-large"></i> Dashboard</a>
            <a href="admin-products.html" class="sidebar-item"><i class="fa fa-box"></i> Inventario</a>
            <a href="admin-orders.html" class="sidebar-item"><i class="fa fa-shopping-cart"></i> Ventas</a>
            <a href="admin-customers.html" class="sidebar-item"><i class="fa fa-users"></i> Clientes</a>
            <div class="sidebar-group">Configuración</div>
            <a href="admin-settings.html" class="sidebar-item active"><i class="fa fa-cog"></i> Ajustes</a>
            <div style="margin-top:auto; padding:1rem;">
                <button class="sidebar-item" onclick="signOutAdmin()" style="color:#ff6b6b;"><i
                        class="fa fa-sign-out-alt"></i> Cerrar Sesión</button>
            </div>
        </aside>

        <div class="admin-content">
            <h2 style="font-size:1.3rem; font-weight:800; color:#f5f5f7; margin-bottom:1.5rem;">Ajustes de la Tienda
            </h2>

            <div class="admin-card">
                <h3
                    style="color:white; margin-bottom:1.5rem; font-size:1rem; border-bottom:1px solid #3a3a3c; padding-bottom:0.5rem;">
                    Envío y Contacto</h3>
                <div class="form-row-2">
                    <div class="form-group">
                        <label>WhatsApp Contacto</label>
                        <div style="display:flex; gap:0.5rem;">
                            <input type="text" id="set-whatsapp" class="form-control">
                            <button class="btn-action primary"
                                onclick="saveSetting('whatsapp', document.getElementById('set-whatsapp').value)">Guardar</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Email Notificaciones</label>
                        <div style="display:flex; gap:0.5rem;">
                            <input type="email" id="set-notification_email" class="form-control">
                            <button class="btn-action primary"
                                onclick="saveSetting('notification_email', document.getElementById('set-notification_email').value)">Guardar</button>
                        </div>
                    </div>
                </div>
                <div class="form-row-2">
                    <div class="form-group">
                        <label>Costo Envío Base ($)</label>
                        <div style="display:flex; gap:0.5rem;">
                            <input type="number" id="set-shipping_cost" class="form-control">
                            <button class="btn-action primary"
                                onclick="saveSetting('shipping_cost', document.getElementById('set-shipping_cost').value)">Guardar</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Envío Gratis desde ($)</label>
                        <div style="display:flex; gap:0.5rem;">
                            <input type="number" id="set-free_shipping_threshold" class="form-control">
                            <button class="btn-action primary"
                                onclick="saveSetting('free_shipping_threshold', document.getElementById('set-free_shipping_threshold').value)">Guardar</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="admin-card">
                <h3
                    style="color:white; margin-bottom:1.5rem; font-size:1rem; border-bottom:1px solid #3a3a3c; padding-bottom:0.5rem;">
                    Pagos (JSON)</h3>
                <div class="form-group">
                    <label>Cuentas Bancarias</label>
                    <textarea id="set-bank_accounts" class="form-control"
                        style="min-height:150px; font-family:monospace;"></textarea>
                    <button class="btn-action primary" style="margin-top:0.5rem;"
                        onclick="saveJsonSetting('bank_accounts')">Actualizar Bancos</button>
                </div>
                <div class="form-group" style="margin-top:1.5rem;">
                    <label>Billeteras Crypto</label>
                    <textarea id="set-crypto_wallets" class="form-control"
                        style="min-height:150px; font-family:monospace;"></textarea>
                    <button class="btn-action primary" style="margin-top:0.5rem;"
                        onclick="saveJsonSetting('crypto_wallets')">Actualizar Crypto</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="/lib/supabase-client.js?v=1.0.6"></script>
    <script src="/lib/auth.js?v=1.0.6"></script>
    <script>
        let adminToken = '';
        async function init() {
            adminToken = await Auth.requireAdmin();
            if (!adminToken) return;
            loadSettings();
        }

        async function apiFetch(url, opts = {}) {
            return fetch(url, {
                ...opts,
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminToken, ...(opts.headers || {}) }
            });
        }

        async function signOutAdmin() { await _supabase.auth.signOut(); location.href = 'login.html'; }

        async function loadSettings() {
            const { data } = await _supabase.from('settings').select('*');
            const map = {}; (data || []).forEach(s => { map[s.key] = s.value; });
            ['free_shipping_threshold', 'shipping_cost', 'whatsapp', 'notification_email'].forEach(key => {
                const el = document.getElementById('set-' + key);
                if (el) el.value = typeof map[key] === 'string' ? map[key].replace(/^"|"$/g, '') : (map[key] ?? '');
            });
            ['bank_accounts', 'crypto_wallets'].forEach(key => {
                const el = document.getElementById('set-' + key);
                if (el) el.value = JSON.stringify(map[key] || [], null, 2);
            });
        }

        async function saveSetting(key, value) {
            const res = await apiFetch('/api/admin/settings', { method: 'PATCH', body: JSON.stringify({ key, value }) });
            if (res.ok) alert('Ajuste guardado Correctamente');
            else { const e = await res.json(); alert('Error: ' + e.error); }
        }

        async function saveJsonSetting(key) {
            try {
                const val = JSON.parse(document.getElementById('set-' + key).value);
                await saveSetting(key, val);
            } catch { alert('JSON inválido'); }
        }

        init();
    </script>
</body>

</html>
