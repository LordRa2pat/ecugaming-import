<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Ecugaming Import</title>
    <link rel="stylesheet" href="style.css?v=1.0.8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: var(--secondary);
            color: var(--bg-light);
            font-feature-settings: "cv11", "ss01";
        }

        .admin-layout {
            min-height: 100vh;
            background: #000;
        }

        .admin-sidebar {
            background: #050505;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            overflow-y: auto;
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: 280px;
            z-index: 1100;
        }

        .sidebar-brand {
            padding: 0 1rem 2rem;
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--white);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-brand span {
            color: var(--primary);
        }

        .sidebar-group {
            font-size: 10px;
            font-weight: 800;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 1.5rem 1rem 0.5rem;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13.5px;
            font-weight: 500;
            color: #a1a1aa;
            text-decoration: none;
            transition: 0.2s;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }

        .sidebar-item:hover {
            background: rgba(255, 255, 255, 0.04);
            color: var(--white);
        }

        .sidebar-item.active {
            background: var(--primary) !important;
            color: #fff !important;
            box-shadow: 0 4px 12px var(--primary-glow);
            font-weight: 700;
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 1rem 0 0;
            border-top: 1px solid rgba(255,255,255,.06);
        }

        .sidebar-item-danger { color: #ff6b6b !important; }
        .sidebar-item-danger:hover { background: rgba(255,107,107,.1) !important; color: #ff8080 !important; }

        .admin-content {
            padding: 2.5rem;
            overflow-x: auto;
            background: var(--bg-light);
            margin-left: 280px;
            min-height: 100vh;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .stat-card .label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 900;
            color: var(--white);
        }

        .admin-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-glass);
        }

        .admin-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 13px;
        }

        .admin-table th {
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-dim);
            font-weight: 600;
            text-align: left;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
        }

        .admin-table td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            color: #e2e2e7;
            vertical-align: middle;
        }
    </style>
</head>

<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-brand">🎮 Ecugaming <span>Import</span></div>
            <div class="sidebar-group">Principal</div>
            <a href="admin.html" class="sidebar-item active"><i class="fa fa-th-large"></i> Dashboard</a>
            <a href="admin-products.html" class="sidebar-item"><i class="fa fa-box"></i> Inventario</a>
            <a href="admin-orders.html" class="sidebar-item"><i class="fa fa-shopping-cart"></i> Ventas</a>
            <a href="admin-customers.html" class="sidebar-item"><i class="fa fa-users"></i> Clientes</a>
            <div class="sidebar-group">Marketing</div>
            <a href="admin-coupons.html" class="sidebar-item"><i class="fa fa-ticket-alt"></i> Cupones</a>
            <div class="sidebar-group">Configuración</div>
            <a href="admin-settings.html" class="sidebar-item"><i class="fa fa-cog"></i> Ajustes</a>
            <div class="sidebar-footer">
                <button class="sidebar-item sidebar-item-danger" onclick="signOutAdmin()"><i
                        class="fa fa-sign-out-alt"></i> Cerrar Sesión</button>
            </div>
        </aside>

        <div class="admin-content">
            <h2 style="font-size:1.3rem; font-weight:800; color:#f5f5f7; margin-bottom:1.5rem;">Panel de Control</h2>

            <div class="stat-grid">
                <div class="stat-card">
                    <div class="label">Ventas Totales</div>
                    <div class="value" id="statOrders">--</div>
                </div>
                <div class="stat-card">
                    <div class="label">Productos Activos</div>
                    <div class="value" id="statProds">--</div>
                </div>
                <div class="stat-card">
                    <div class="label">Nuevos Clientes</div>
                    <div class="value" id="statUsers">--</div>
                </div>
            </div>

            <div class="admin-card">
                <h3 style="color:white; margin-bottom:1.5rem; font-size:1rem;">Pedidos Recientes</h3>
                <div style="overflow-x:auto;" id="recentOrders">
                    <p style="color:#9999a8; text-align:center; padding:2rem;">Cargando datos...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="/lib/supabase-client.js?v=1.0.6"></script>
    <script src="/lib/auth.js?v=1.0.6"></script>
    <script>
        let adminToken = '';
        async function init() {
            adminToken = await Auth.requireAdmin();
            if (!adminToken) return;
            loadDashboard();
        }

        async function apiFetch(url, opts = {}) {
            return fetch(url, {
                ...opts,
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminToken, ...(opts.headers || {}) }
            });
        }

        async function signOutAdmin() { await _supabase.auth.signOut(); location.href = 'login.html'; }

        async function loadDashboard() {
            try {
                const [pr, or, ur] = await Promise.all([
                    apiFetch('/api/admin/products'),
                    apiFetch('/api/admin/orders?limit=10'),
                    apiFetch('/api/admin/users')
                ]);
                const prods = await pr.json();
                const odata = await or.json();
                const users = await ur.json();

                document.getElementById('statProds').textContent = prods.filter(p => p.is_active).length;
                document.getElementById('statOrders').textContent = odata.total || 0;
                document.getElementById('statUsers').textContent = users.length;

                const recent = odata.orders || [];
                document.getElementById('recentOrders').innerHTML = recent.length
                    ? `<table class="admin-table"><thead><tr><th>ID</th><th>Cliente</th><th>Total</th><th>Fecha</th></tr></thead><tbody>${recent.slice(0, 5).map(o => `<tr>
                        <td style="font-weight:700;">${o.id}</td>
                        <td>${o.customer?.first_name || ''} ${o.customer?.last_name || ''}</td>
                        <td style="font-weight:700;">$${Number(o.total).toFixed(2)}</td>
                        <td>${new Date(o.created_at).toLocaleDateString()}</td>
                    </tr>`).join('')}</tbody></table>`
                    : '<p style="color:#9999a8; text-align:center; padding:2rem;">Sin pedidos aún.</p>';

            } catch (e) { console.error(e); }
        }

        init();
    </script>
</body>

</html>
