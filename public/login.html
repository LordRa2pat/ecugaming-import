<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Ecugaming Import</title>
    <link rel="stylesheet" href="style.css?v=1.0.8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
    body { background: var(--bg-light); color: var(--text); }
    .auth-container {
    max-width: 450px;
    margin: 120px auto;
    padding: 2.5rem;
    background: var(--card-bg);
    border-radius: 24px;
    box-shadow: var(--shadow-soft);
    border: 1px solid var(--border);
    }

    .auth-header {
    text-align: center;
    margin-bottom: 2rem;
    }

    .auth-header h1 {
    color: var(--white);
    font-weight: 900;
    font-size: 2rem;
    }

    .auth-header span {
    color: var(--primary);
    }

    .form-group {
    margin-bottom: 1.2rem;
    }

    .form-group label {
    display: block;
    margin-bottom: .5rem;
    font-weight: 600;
    font-size: .9rem;
    color: var(--text-dim);
    }

    .form-control {
    width: 100%;
    padding: 1rem;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.05);
    color: var(--white);
    font-size: 1rem;
    transition: .3s;
    box-sizing: border-box;
    }

    .form-control:focus {
    border-color: var(--primary);
    outline: none;
    box-shadow: 0 0 0 3px rgba(0, 113, 227, .1);
    }

    .btn-auth {
    width: 100%;
    padding: 1rem;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-weight: 700;
    font-size: 1.1rem;
    cursor: pointer;
    transition: .2s;
    }

    .btn-auth:hover {
    opacity: .88;
    }

    .btn-auth:disabled {
    opacity: .6;
    cursor: not-allowed;
    }

    .auth-footer {
    text-align: center;
    margin-top: 1.5rem;
    font-size: .9rem;
    color: var(--text-dim);
    }

    .auth-footer a {
    color: var(--primary);
    font-weight: 700;
    text-decoration: none;
    }

    .error-msg {
    background: #fff0f0;
    color: #c0392b;
    border: 1px solid #f5c6c6;
    border-radius: 10px;
    padding: .8rem 1rem;
    margin-bottom: 1rem;
    font-size: .9rem;
    display: none;
    }

    .success-msg {
    background: #f0fff4;
    color: #27ae60;
    border: 1px solid #b2dfdb;
    border-radius: 10px;
    padding: .8rem 1rem;
    margin-bottom: 1rem;
    font-size: .9rem;
    display: none;
    }
    </style>
</head>

<body>
    <header>
        <div class="logo" onclick="location.href='/'">Ecugaming <span>Import</span></div>
        <div class="nav-actions">
            <a href="/" style="font-size:.82rem; font-weight:700; color:var(--text-dim); text-decoration:none; display:flex; align-items:center; gap:.4rem;">
                <i class="fa fa-arrow-left"></i> Volver a la Tienda
            </a>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-header">
            <h1>Bienvenido <span>Ecugaming</span></h1>
            <p>Accede para realizar tus compras y rastreos.</p>
        </div>

        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="logEmail" class="form-control" required placeholder="tu@email.com"
                    autocomplete="email">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="logPass" class="form-control" required placeholder="••••••••"
                    autocomplete="current-password">
            </div>
            <button type="submit" id="submitBtn" class="btn-auth">
                <i class="fas fa-sign-in-alt"></i> Entrar
            </button>
        </form>

        <div class="auth-footer">
            ¿No tienes cuenta? <a href="/register">Regístrate Hoy</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="/lib/supabase-client.js?v=1.0.2"></script>
    <script>
        (async () => {
            // If already logged in, redirect
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                const params = new URLSearchParams(location.search);
                location.href = params.get('redirect') || '/';
                return;
            }
        })();

        const form = document.getElementById('loginForm');
        const btn = document.getElementById('submitBtn');
        const errorEl = document.getElementById('errorMsg');
        const successEl = document.getElementById('successMsg');

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            successEl.style.display = 'none';
        }
        function showSuccess(msg) {
            successEl.textContent = msg;
            successEl.style.display = 'block';
            errorEl.style.display = 'none';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.style.display = 'none';

            const email = document.getElementById('logEmail').value.trim();
            const password = document.getElementById('logPass').value;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';

            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

            if (error) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
                const msg = error.message.includes('Invalid login')
                    ? 'Correo o contraseña incorrectos'
                    : error.message;
                showError(msg);
                return;
            }

            showSuccess('¡Bienvenido! Redirigiendo...');
            const params = new URLSearchParams(location.search);
            setTimeout(() => {
                location.href = params.get('redirect') || '/';
            }, 600);
        });
    </script>
</body>

</html>
