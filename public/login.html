<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Ecugaming Import</title>
    <link rel="stylesheet" href="style.css?v=1.0.8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: var(--bg-light);
            color: var(--text);
        }

        .auth-container {
            max-width: 450px;
            margin: 120px auto;
            padding: 2.5rem;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--border);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            color: var(--text);
            font-weight: 900;
            font-size: 2rem;
        }

        .auth-header span {
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: .5rem;
            font-weight: 600;
            font-size: .9rem;
            color: var(--text-dim);
        }

        .form-control {
            width: 100%;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.03);
            color: var(--text);
            font-size: 1rem;
            transition: .3s;
            box-sizing: border-box;
        }

        .form-control:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 113, 227, .1);
        }

        .btn-auth {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: .2s;
        }

        .btn-auth:hover {
            opacity: .88;
        }

        .btn-auth:disabled {
            opacity: .6;
            cursor: not-allowed;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: .9rem;
            color: var(--text-dim);
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
        }

        .error-msg {
            background: #fff0f0;
            color: #c0392b;
            border: 1px solid #f5c6c6;
            border-radius: 10px;
            padding: .8rem 1rem;
            margin-bottom: 1rem;
            font-size: .9rem;
            display: none;
        }

        .success-msg {
            background: #f0fff4;
            color: #27ae60;
            border: 1px solid #b2dfdb;
            border-radius: 10px;
            padding: .8rem 1rem;
            margin-bottom: 1rem;
            font-size: .9rem;
            display: none;
        }
    </style>
</head>

<body>
    <header style="background: rgba(10, 10, 11, 0.9); border-bottom: 1px solid var(--border);">
        <div class="logo" onclick="location.href='/'" style="color: #fff;">Ecugaming <span style="color: #fff; opacity: 0.8;">Import</span></div>

        <div class="search-container" style="display:flex; align-items:center; background:rgba(255,255,255,0.08); border-radius:20px; padding:0 12px; height:36px; margin:0 1rem;">
            <i class="fa fa-search search-icon" style="color:#fff; opacity:0.7; font-size:14px;"></i>
            <input type="text" id="searchInput" placeholder="Buscar..." 
                onkeydown="if(event.key==='Enter') { if(window.handleSearch){ handleSearch(); } else { location.href='/?q='+encodeURIComponent(this.value); } }"
                style="background:transparent; border:none; color:#fff; margin-left:8px; outline:none; font-size:.9rem; width:100%;">
        </div>

        <div class="nav-actions" style="display:flex; align-items:center; gap:16px;">
            <div id="authArea" style="display:flex; gap:.5rem; align-items:center; color:#fff;"></div>
            <div onclick="if(window.toggleCart) toggleCart(true); else location.href='/checkout'" style="position:relative; cursor:pointer;">
                <i class="fa fa-shopping-bag" style="font-size:1.2rem; color:#fff;"></i>
                <span id="cartBadge" style="position:absolute; top:-5px; right:-8px; background:var(--accent); color:#fff; font-size:10px; padding:2px 5px; border-radius:50%; font-weight:800; display:none;">0</span>
            </div>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-header">
            <h1>Bienvenido <span>Ecugaming</span></h1>
            <p>Accede para realizar tus compras y rastreos.</p>
        </div>

        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="logEmail" class="form-control" required placeholder="tu@email.com"
                    autocomplete="email">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="logPass" class="form-control" required placeholder="••••••••"
                    autocomplete="current-password">
            </div>
            <button type="submit" id="submitBtn" class="btn-auth">
                <i class="fas fa-sign-in-alt"></i> Entrar
            </button>
        </form>

        <!-- Feature 5: Forgot password -->
        <div style="text-align:center; margin:.8rem 0 .5rem;">
            <button onclick="handleForgotPassword()"
                style="background:none;border:none;color:var(--text-dim);font-size:.83rem;cursor:pointer;text-decoration:underline;">
                ¿Olvidaste tu contraseña?
            </button>
        </div>

        <div class="auth-footer">
            ¿No tienes cuenta? <a href="/register">Regístrate Hoy</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="/lib/supabase-client.js?v=1.0.2"></script>
    <script>
        (async () => {
            // Wait for Supabase to initialize
            await window._supabaseReady;
            if (!window._supabase) return;
            // If already logged in, redirect
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                const params = new URLSearchParams(location.search);
                let redirectUrl = params.get('redirect');
                if (!redirectUrl) {
                    try {
                        const { data: profile } = await _supabase.from('profiles').select('role').eq('id', session.user.id).single();
                        redirectUrl = (profile && profile.role === 'admin') ? '/admin.html' : '/';
                    } catch(e) { redirectUrl = '/'; }
                }
                location.href = redirectUrl;
                return;
            }
        })();

        const form = document.getElementById('loginForm');
        const btn = document.getElementById('submitBtn');
        const errorEl = document.getElementById('errorMsg');
        const successEl = document.getElementById('successMsg');

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            successEl.style.display = 'none';
        }
        function showSuccess(msg) {
            successEl.textContent = msg;
            successEl.style.display = 'block';
            errorEl.style.display = 'none';
        }

        async function handleForgotPassword() {
            const email = document.getElementById('logEmail').value.trim();
            if (!email) { showError('Ingresa tu correo primero para restablecer la contraseña.'); return; }
            errorEl.style.display = 'none';
            await window._supabaseReady;
            const { error } = await _supabase.auth.resetPasswordForEmail(email, {
                redirectTo: location.origin + '/account'
            });
            if (error) showError(error.message);
            else showSuccess('✓ Revisa tu correo — te enviamos un enlace para restablecer tu contraseña.');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.style.display = 'none';

            const email = document.getElementById('logEmail').value.trim();
            const password = document.getElementById('logPass').value;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';

            await window._supabaseReady;
            if (!window._supabase) { showError('Error de conexión. Recarga la página.'); btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar'; return; }
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

            if (error) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
                const msg = error.message.includes('Invalid login')
                    ? 'Correo o contraseña incorrectos'
                    : error.message;
                showError(msg);
                return;
            }

            showSuccess('¡Bienvenido! Redirigiendo...');
            const params = new URLSearchParams(location.search);
            let redirectUrl = params.get('redirect');
            if (!redirectUrl) {
                try {
                    const { data: profile } = await _supabase.from('profiles').select('role').eq('id', data.user.id).single();
                    redirectUrl = (profile && profile.role === 'admin') ? '/admin.html' : '/';
                } catch(e) { redirectUrl = '/'; }
            }

            setTimeout(() => {
                location.href = redirectUrl;
            }, 600);
        });
    </script>
</body>

</html>
