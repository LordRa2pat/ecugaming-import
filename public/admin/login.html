<!DOCTYPE html>
<html lang="es">

<head>
    <style>
        html,
        body {
            background: #0a0a0b !important
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | StreamCell</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
            background: radial-gradient(circle at top right, rgba(255, 107, 0, 0.05), transparent),
                radial-gradient(circle at bottom left, rgba(255, 107, 0, 0.02), transparent);
        }

        .login-container {
            width: 100%;
            max-width: 400px;
        }

        .login-card {
            background: rgba(20, 20, 22, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 107, 0, 0.2);
            border-radius: var(--r-xl);
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), #ff8c00);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo .icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary), #ff8c00);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 10px 15px -3px rgba(255, 107, 0, 0.3);
        }

        .login-logo h1 {
            font-size: 1.75rem;
            letter-spacing: -0.02em;
        }

        .login-logo h1 span {
            color: var(--primary);
        }

        .login-logo p {
            font-size: .85rem;
            color: var(--text-dim);
            margin-top: .5rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-weight: 700;
            opacity: 0.6;
        }

        .captcha-container {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.25rem;
            background: rgba(255, 107, 0, 0.03);
            border: 1px solid rgba(255, 107, 0, 0.1);
            padding: 0.75rem;
            border-radius: var(--r);
        }

        .captcha-canvas-box {
            background: #fff;
            border-radius: 4px;
            padding: 2px;
            cursor: pointer;
            height: 40px;
            width: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #captchaCanvas {
            border-radius: 2px;
        }

        .captcha-refresh {
            color: var(--primary);
            cursor: pointer;
            font-size: 0.9rem;
            transition: transform 0.3s;
        }

        .captcha-refresh:hover {
            transform: rotate(180deg);
        }

        .btn-admin {
            background: linear-gradient(90deg, var(--primary), #ff8c00);
            color: #000;
            border: none;
            font-weight: 800;
            letter-spacing: 0.02em;
        }

        .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(255, 107, 0, 0.4);
            filter: brightness(1.1);
        }

        .alert-admin {
            margin-bottom: 1.5rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ff6b6b;
            padding: 0.75rem 1rem;
            border-radius: var(--r);
            font-size: 0.85rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <div class="icon"><i class="fa-solid fa-shield-halved"></i></div>
                <h1>Panel<span>Admin</span></h1>
                <p>StreamCell Control</p>
            </div>

            <div id="loginAlert" class="alert-admin">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="alertMsg"></span>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">Correo Administrativo</label>
                    <div class="input-group">
                        <span class="input-icon"><i class="fa-regular fa-envelope"></i></span>
                        <input type="email" class="form-control" id="emailInput" placeholder="nombre@streamcell.app"
                            required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Contraseña</label>
                    <div class="input-group">
                        <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" class="form-control" id="passwordInput" placeholder="••••••••" required>
                        <span class="input-suffix" onclick="togglePassword()"><i class="fa-regular fa-eye"
                                id="passToggleIcon"></i></span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Verificación</label>
                    <div class="captcha-container">
                        <div class="captcha-canvas-box" onclick="generateCaptcha()" title="Refrescar">
                            <canvas id="captchaCanvas" width="120" height="40"></canvas>
                        </div>
                        <i class="fa-solid fa-rotate-right captcha-refresh" onclick="generateCaptcha()"></i>
                        <input type="text" class="form-control" id="captchaInput" placeholder="Código" required
                            style="margin-bottom:0; flex:1;">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg btn-admin" id="loginBtn">
                    ACCEDER AL PANEL <i class="fa-solid fa-arrow-right" style="margin-left: 5px"></i>
                </button>
            </form>

            <div style="text-align:center;margin-top:2rem;">
                <a href="/index.html" style="font-size:.78rem;color:var(--text-muted);text-decoration:none;">
                    <i class="fa-solid fa-house" style="margin-right: 5px"></i> Volver a la tienda
                </a>
            </div>
        </div>
    </div>

    <script>
        window.API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:3000/api' : '/api';
        let currentCaptchaText = "";

        function generateCaptcha() {
            const canvas = document.getElementById('captchaCanvas');
            const ctx = canvas.getContext('2d');
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            currentCaptchaText = "";
            for (let i = 0; i < 5; i++) {
                currentCaptchaText += chars.charAt(Math.floor(Math.random() * chars.length));
            }

            ctx.fillStyle = "#fff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < 8; i++) {
                ctx.strokeStyle = `rgba(255, 107, 0, ${Math.random() * 0.2})`;
                ctx.beginPath();
                ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
                ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
                ctx.stroke();
            }

            ctx.font = "bold 24px 'Inter', sans-serif";
            ctx.textBaseline = "middle";
            for (let i = 0; i < currentCaptchaText.length; i++) {
                const x = 10 + (i * 20);
                const y = 20 + (Math.random() * 8 - 4);
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate((Math.random() * 0.4) - 0.2);
                ctx.fillStyle = "#000";
                ctx.fillText(currentCaptchaText[i], 0, 0);
                ctx.restore();
            }
            document.getElementById('captchaInput').value = "";
        }

        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const icon = document.getElementById('passToggleIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fa-regular fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fa-regular fa-eye';
            }
        }

        function showAlert(msg) {
            const alert = document.getElementById('loginAlert');
            document.getElementById('alertMsg').textContent = msg;
            alert.style.display = 'flex';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const captcha = document.getElementById('captchaInput').value.trim().toUpperCase();

            if (captcha !== currentCaptchaText) {
                showAlert('Código de verificación incorrecto');
                generateCaptcha();
                return;
            }

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner" style="border-top-color:#000"></span> AUTENTICANDO...';

            try {
                const res = await fetch(API_BASE + '/admin/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Error al iniciar sesión');

                // Redirect to dashboard
                window.location.href = '/admin/index.html';

            } catch (err) {
                showAlert(err.message);
                generateCaptcha();
                btn.disabled = false;
                btn.innerHTML = 'ACCEDER AL PANEL <i class="fa-solid fa-arrow-right" style="margin-left: 5px"></i>';
            }
        }

        document.addEventListener('DOMContentLoaded', generateCaptcha);
    </script>
</body>

</html>
