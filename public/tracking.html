<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastreo de Pedido | Ecugaming Import</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .tracking-container {
            max-width: 800px;
            margin: 120px auto 60px;
            padding: 2.5rem;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            color: var(--text);
        }

        .tracking-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .tracking-header h1 {
            color: var(--white);
            font-weight: 900;
        }

        .tracking-header p {
            color: var(--text-dim);
        }

        .tracking-header span {
            color: var(--primary);
        }

        .tracking-input {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .tracking-input input {
            flex-grow: 1;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.06);
            color: var(--white);
            font-size: 1.1rem;
        }

        .tracking-input input::placeholder { color: var(--text-dim); }

        .tracking-result {
            display: none;
            margin-top: 2rem;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .order-info-card {
            background: rgba(255, 255, 255, 0.04);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            border: 1px dashed var(--border);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem 2rem;
        }

        .order-info-card .info-row {
            display: flex;
            flex-direction: column;
        }

        .order-info-card .info-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            margin-bottom: 0.2rem;
        }

        .order-info-card .info-value {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
        }

        .tracking-code-box {
            background: rgba(52, 199, 89, 0.08);
            border: 1px solid rgba(52, 199, 89, 0.25);
            border-radius: 10px;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .tracking-code-box i {
            color: #34c759;
            font-size: 1.3rem;
        }

        .tracking-code-box span {
            font-weight: 700;
            color: #34c759;
            font-size: 1.05rem;
        }

        .cancelled-box {
            background: rgba(255, 69, 58, 0.1);
            border: 1px solid rgba(255, 69, 58, 0.3);
            border-radius: 10px;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            color: #ff453a;
            font-weight: 600;
        }

        /* Timeline */
        .timeline {
            position: relative;
            padding: 2rem 0 0.5rem;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 4px;
            background: rgba(255, 255, 255, 0.08);
        }

        .timeline-step {
            position: relative;
            padding-left: 60px;
            margin-bottom: 2.5rem;
        }

        .step-icon {
            position: absolute;
            left: 0;
            width: 44px;
            height: 44px;
            background: #2c2c2e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            z-index: 2;
            border: 4px solid var(--card-bg);
            flex-shrink: 0;
        }

        .timeline-step.done .step-icon {
            background: var(--accent);
        }

        .timeline-step.current .step-icon {
            background: var(--primary);
            transform: scale(1.1);
            box-shadow: 0 0 0 10px rgba(255, 69, 0, 0.15);
        }

        .timeline-step.cancelled-step .step-icon {
            background: #ff453a;
        }

        .step-title {
            font-weight: 800;
            font-size: 1.05rem;
            color: var(--text-dim);
            margin-bottom: 0.2rem;
        }

        .timeline-step.done .step-title   { color: var(--accent); }
        .timeline-step.current .step-title { color: var(--primary); }
        .timeline-step.cancelled-step .step-title { color: #ff453a; }

        .step-desc {
            font-size: 0.88rem;
            color: var(--text-dim);
            margin-bottom: 0.15rem;
        }

        .step-date {
            font-size: 0.8rem;
            color: #a1a1a6;
        }

        .step-note {
            font-size: 0.85rem;
            color: var(--text-dim);
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid var(--accent);
            padding: 0.4rem 0.75rem;
            border-radius: 0 6px 6px 0;
            margin-top: 0.4rem;
        }

        .error-msg {
            text-align: center;
            padding: 2rem;
            color: #ff453a;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .tracking-container { margin: 90px 1rem 2rem; padding: 1.5rem; }
            .order-info-card { grid-template-columns: 1fr; }
            .tracking-input { flex-direction: column; }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo" onclick="location.href='/'">Ecugaming <span>Import</span></div>
        <div class="nav-actions">
            <button class="btn-secondary" style="margin:0;padding:0.5rem 1.5rem;"
                onclick="location.href='/'">← Tienda</button>
        </div>
    </header>

    <div class="tracking-container">
        <div class="tracking-header">
            <h1>Rastrea tu <span>Pedido</span></h1>
            <p>Ingresa tu número de orden (EG-XXXXXXXX) para consultar el estado actual.</p>
        </div>

        <div class="tracking-input">
            <input type="text" id="orderId" placeholder="Ej: EG-ABC123XY" oninput="this.value=this.value.toUpperCase()">
            <button class="btn-buy" id="trackBtn" onclick="trackOrder()" style="width:auto;padding:1rem 2rem;">
                <i class="fa fa-search" style="margin-right:0.5rem;"></i>Rastrear
            </button>
        </div>
        <div id="trackError" style="color:#dc2626;font-size:0.9rem;margin-bottom:1rem;display:none;"></div>

        <div id="trackingResult" class="tracking-result"></div>
    </div>

    <script>
        const STATUS_META = {
            confirmando_pago:  { icon: 'fa-receipt',       label: 'Confirmando Pago',    desc: 'Nuestro equipo está verificando tu comprobante de pago.' },
            orden_confirmada:  { icon: 'fa-check-circle',  label: 'Orden Confirmada',    desc: 'El pago fue validado y la orden está lista para procesamiento.' },
            empacando:         { icon: 'fa-box-open',       label: 'Empacando Producto',  desc: 'Estamos preparando tu pedido con la mayor protección.' },
            enviado:           { icon: 'fa-shipping-fast',  label: 'Enviado',             desc: 'Tu pedido está en camino con la transportadora.' },
            recibido:          { icon: 'fa-handshake',      label: 'Recibido',            desc: '¡Pedido entregado! Gracias por confiar en nosotros.' },
            cancelado:         { icon: 'fa-times-circle',   label: 'Cancelado',           desc: 'Este pedido fue cancelado.' }
        };

        const ORDER_FLOW = ['confirmando_pago','orden_confirmada','empacando','enviado','recibido'];

        function formatDate(iso) {
            if (!iso) return '';
            const d = new Date(iso);
            return d.toLocaleDateString('es-EC', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
        }

        function formatAddress(sa) {
            if (!sa) return '—';
            const parts = [sa.address1, sa.city, sa.province].filter(Boolean);
            if (sa.reference) parts.push(`Ref: ${sa.reference}`);
            return parts.join(', ');
        }

        async function trackOrder() {
            const input = document.getElementById('orderId');
            const id = input.value.trim().toUpperCase();
            const errEl = document.getElementById('trackError');
            const resultEl = document.getElementById('trackingResult');
            const btn = document.getElementById('trackBtn');

            errEl.style.display = 'none';
            if (!id) { errEl.textContent = 'Ingresa el número de orden.'; errEl.style.display = 'block'; return; }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa fa-spinner fa-spin" style="margin-right:0.5rem;"></i>Buscando...';
            resultEl.style.display = 'none';

            try {
                const res = await fetch(`/api/orders/track/${encodeURIComponent(id)}`);
                const data = await res.json();

                if (!res.ok) {
                    errEl.textContent = data.error || 'Pedido no encontrado. Revisa el número de orden.';
                    errEl.style.display = 'block';
                    resultEl.style.display = 'none';
                    return;
                }
                renderOrder(data);
            } catch (err) {
                errEl.textContent = 'Error de conexión. Por favor intenta nuevamente.';
                errEl.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa fa-search" style="margin-right:0.5rem;"></i>Rastrear';
            }
        }

        function renderOrder(order) {
            const resultEl = document.getElementById('trackingResult');
            const sa = order.shipping_address || {};
            const isCancelled = order.status === 'cancelado';

            // Order info card
            let html = `<div class="order-info-card">
                <div class="info-row">
                    <span class="info-label">Número de Orden</span>
                    <span class="info-value">${order.id}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Estado Actual</span>
                    <span class="info-value" style="color:${isCancelled ? '#dc2626' : 'var(--primary)'}">
                        ${STATUS_META[order.status]?.label || order.status}
                    </span>
                </div>
                <div class="info-row" style="grid-column:1/-1">
                    <span class="info-label">Dirección de Envío</span>
                    <span class="info-value">${formatAddress(sa)}</span>
                </div>`;

            if (order.carrier) {
                html += `<div class="info-row">
                    <span class="info-label">Transportadora</span>
                    <span class="info-value">${order.carrier}${order.carrier_agency_name ? ' — ' + order.carrier_agency_name : ''}</span>
                </div>`;
            }
            html += `</div>`;

            // Cancelled warning
            if (isCancelled) {
                html += `<div class="cancelled-box">
                    <i class="fa fa-times-circle"></i>
                    <span>Este pedido ha sido cancelado. Contáctanos por WhatsApp si tienes dudas.</span>
                </div>`;
            }

            // Tracking code
            if (order.tracking_code) {
                html += `<div class="tracking-code-box">
                    <i class="fa fa-barcode"></i>
                    <div>
                        <div style="font-size:0.8rem;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;">Código de Rastreo</div>
                        <span>${order.tracking_code}</span>
                    </div>
                </div>`;
            }

            // Timeline
            html += `<div class="timeline">`;

            if (isCancelled) {
                // Show events up to cancellation
                const events = order.events || [];
                if (events.length > 0) {
                    events.forEach(ev => {
                        const meta = STATUS_META[ev.status] || { icon: 'fa-circle', label: ev.status };
                        const isCancelEv = ev.status === 'cancelado';
                        html += `<div class="timeline-step ${isCancelEv ? 'cancelled-step' : 'done'}">
                            <div class="step-icon"><i class="fa ${meta.icon}"></i></div>
                            <div class="step-title">${meta.label}</div>
                            <div class="step-date">${formatDate(ev.created_at)}</div>
                            ${ev.note ? `<div class="step-note">${ev.note}</div>` : ''}
                        </div>`;
                    });
                } else {
                    html += `<div class="timeline-step cancelled-step">
                        <div class="step-icon"><i class="fa fa-times-circle"></i></div>
                        <div class="step-title">Cancelado</div>
                        <div class="step-desc">Este pedido fue cancelado.</div>
                    </div>`;
                }
            } else {
                // Build timeline from events keyed by status
                const events = order.events || [];
                const eventMap = {};
                events.forEach(ev => { eventMap[ev.status] = ev; });

                const currentIdx = ORDER_FLOW.indexOf(order.status);

                ORDER_FLOW.forEach((status, idx) => {
                    const meta = STATUS_META[status];
                    const ev = eventMap[status];
                    let cls = '';
                    if (idx < currentIdx) cls = 'done';
                    else if (idx === currentIdx) cls = 'current';

                    html += `<div class="timeline-step ${cls}">
                        <div class="step-icon"><i class="fa ${meta.icon}"></i></div>
                        <div class="step-title">${meta.label}</div>
                        <div class="step-desc">${meta.desc}</div>`;
                    if (ev) {
                        html += `<div class="step-date">${formatDate(ev.created_at)}</div>`;
                        if (ev.note) html += `<div class="step-note">${ev.note}</div>`;
                    }
                    html += `</div>`;
                });
            }

            html += `</div>`;

            resultEl.innerHTML = html;
            resultEl.style.display = 'block';
        }

        // Auto-track if ?id= param present
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(location.search);
            const id = params.get('id');
            if (id) {
                document.getElementById('orderId').value = id.toUpperCase();
                trackOrder();
            }
        });

        document.getElementById('orderId').addEventListener('keydown', e => {
            if (e.key === 'Enter') trackOrder();
        });
    </script>
</body>

</html>
